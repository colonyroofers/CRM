<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ============================================================
    // COLONY ROOFERS — UNIFIED CRM
    // Modules: Estimating | Production | Sales | Product Catalog
    // ============================================================

    // ─── CONFIGURATION ───────────────────────────────────────
    window.__WEATHER_API_KEY = ""; // User fills in OpenWeatherMap API key

    // ─── FIREBASE CONFIG ───────────────────────────────────────
    // Loaded from serverless function to avoid secrets in source code
    let FIREBASE_CONFIG = null;

    async function loadFirebaseConfig() {
      try {
        const res = await fetch("/api/config");
        if (res.ok) { FIREBASE_CONFIG = await res.json(); return true; }
        console.error("Config endpoint returned status:", res.status);
      } catch (e) { console.error("Config load error:", e); }
      return false;
    }

    let firebaseApp = null, firebaseAuth = null, googleProvider = null, firestoreDb = null;
    let firebaseStorage = null;
    let firebaseLoaded = false;

    async function loadFirebase() {
      if (firebaseLoaded) return true;
      try {
        if (!FIREBASE_CONFIG) {
          const ok = await loadFirebaseConfig();
          if (!ok) {
            console.error("Could not load Firebase config from /api/config");
            return false;
          }
        }
        if (!window.firebase) { console.error("Firebase SDK not loaded from CDN"); return false; }
        // Guard against double-init (e.g. hot reload)
        if (firebase.apps && firebase.apps.length > 0) {
          firebaseApp = firebase.apps[0];
        } else {
          firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
        }
        firebaseAuth = firebase.auth();
        googleProvider = new firebase.auth.GoogleAuthProvider();
        firestoreDb = firebase.firestore();
        // Enable offline persistence
        firestoreDb.enablePersistence({ synchronizeTabs: true }).catch(err => {
          if (err.code === 'failed-precondition') console.warn('Offline: multi-tab not supported');
          if (err.code === 'unimplemented') console.warn('Offline: not supported in this browser');
        });
        firebaseStorage = firebase.storage();
        firebaseLoaded = true;
        console.log("Firebase loaded successfully");
        return true;
      } catch (e) { console.error("Firebase load error:", e); return false; }
    }

    function useFirebaseAuth() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      useEffect(() => {
        let unsub = null;
        loadFirebase().then(ok => {
          if (!ok) { setError("Could not connect to Firebase. Check that /api/config is returning your Firebase configuration."); setLoading(false); return; }
          unsub = firebaseAuth.onAuthStateChanged(fb => {
            setUser(fb ? { name: fb.displayName, email: fb.email, picture: fb.photoURL, uid: fb.uid } : null);
            setLoading(false);
          });
        });
        return () => { if (unsub) unsub(); };
      }, []);
      const signIn = useCallback(async () => {
        try { setError(null); await firebaseAuth.signInWithPopup(googleProvider); }
        catch (e) { if (e.code !== "auth/popup-closed-by-user") setError("Sign-in failed: " + e.message); }
      }, []);
      const signOut = useCallback(async () => { if (firebaseAuth) await firebaseAuth.signOut(); }, []);
      return { user, loading, error, signIn, signOut };
    }

    // ─── UTILITY HOOKS ──────────────────────────────────────
    function useIsMobile(breakpoint = 768) {
      const [isMobile, setIsMobile] = useState(window.innerWidth <= breakpoint);
      useEffect(() => {
        const handler = () => setIsMobile(window.innerWidth <= breakpoint);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, [breakpoint]);
      return isMobile;
    }

    function useOnlineStatus() {
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      useEffect(() => {
        const on = () => setIsOnline(true);
        const off = () => setIsOnline(false);
        window.addEventListener("online", on);
        window.addEventListener("offline", off);
        return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
      }, []);
      return isOnline;
    }

    function daysBetweenDates(d1, d2) {
      return Math.floor((new Date(d2) - new Date(d1)) / 86400000);
    }

    // ─── NOTIFICATION ENGINE ───────────────────────────────────
    function useNotificationEngine(salesLeads = [], serviceTickets = [], inspections = [], submissions = [], user, crmUsers = []) {
      const [alerts, setAlerts] = useState([]);
      const alertsRef = useRef({});

      useEffect(() => {
        const generateAlerts = () => {
          const now = new Date();
          const today = now.toISOString().split("T")[0];
          const newAlerts = [];
          const seen = {};

          // 1. Bid due in 48 hours
          salesLeads.forEach(lead => {
            if (lead.status === "being_estimated" && lead.bidDueDate) {
              const daysUntilDue = daysBetweenDates(now, lead.bidDueDate);
              if (daysUntilDue >= 0 && daysUntilDue <= 2) {
                const key = `bid_due_${lead.id}`;
                if (!seen[key]) {
                  newAlerts.push({
                    id: lead.id + "_bid_due",
                    type: "bid_due",
                    title: `Bid Due Soon: ${lead.projectName}`,
                    message: `Bid is due in ${daysUntilDue} day${daysUntilDue !== 1 ? "s" : ""}`,
                    severity: daysUntilDue === 0 ? "critical" : "warning",
                    module: "sales",
                    entityId: lead.id,
                    createdAt: now.toISOString()
                  });
                  seen[key] = true;
                }
              }
            }
          });

          // 2. Stale lead (new_lead or contacted with 3+ days no activity)
          salesLeads.forEach(lead => {
            if ((lead.status === "new_lead" || lead.status === "contacted") && lead.createdAt) {
              const daysSinceActivity = daysBetweenDates(lead.lastActivityAt || lead.createdAt, now);
              if (daysSinceActivity >= 3) {
                const key = `stale_lead_${lead.id}`;
                if (!seen[key]) {
                  newAlerts.push({
                    id: lead.id + "_stale",
                    type: "stale_lead",
                    title: `Stale Lead: ${lead.projectName}`,
                    message: `No activity for ${daysSinceActivity} days`,
                    severity: "info",
                    module: "sales",
                    entityId: lead.id,
                    createdAt: now.toISOString()
                  });
                  seen[key] = true;
                }
              }
            }
          });

          // 3. Follow-up needed (proposal_sent with 3+ days no activity)
          salesLeads.forEach(lead => {
            if (lead.status === "proposal_sent" && lead.createdAt) {
              const daysSinceActivity = daysBetweenDates(lead.lastActivityAt || lead.createdAt, now);
              if (daysSinceActivity >= 3) {
                const key = `followup_${lead.id}`;
                if (!seen[key]) {
                  newAlerts.push({
                    id: lead.id + "_followup",
                    type: "follow_up",
                    title: `Follow-up Needed: ${lead.projectName}`,
                    message: `Proposal sent ${daysSinceActivity} days ago`,
                    severity: "warning",
                    module: "sales",
                    entityId: lead.id,
                    createdAt: now.toISOString()
                  });
                  seen[key] = true;
                }
              }
            }
          });

          // 4. Emergency ticket (Emergency priority + New status)
          serviceTickets.forEach(ticket => {
            if (ticket.priority === "Emergency" && ticket.status === "New") {
              const key = `emergency_${ticket.id}`;
              if (!seen[key]) {
                newAlerts.push({
                  id: ticket.id + "_emergency",
                  type: "emergency",
                  title: `Emergency Service Ticket: ${ticket.title}`,
                  message: `Requires immediate attention`,
                  severity: "critical",
                  module: "service",
                  entityId: ticket.id,
                  createdAt: now.toISOString()
                });
                seen[key] = true;
              }
            }
          });

          // 5. Inspection today
          inspections.forEach(inspection => {
            if (inspection.scheduledDate === today) {
              const key = `inspection_${inspection.id}`;
              if (!seen[key]) {
                newAlerts.push({
                  id: inspection.id + "_today",
                  type: "inspection",
                  title: `Inspection Today: ${inspection.propertyAddress}`,
                  message: `Scheduled for ${inspection.inspector || "TBD"}`,
                  severity: "info",
                  module: "inspections",
                  entityId: inspection.id,
                  createdAt: now.toISOString()
                });
                seen[key] = true;
              }
            }
          });

          setAlerts(newAlerts);
        };

        generateAlerts();
        const interval = setInterval(generateAlerts, 5 * 60 * 1000); // Every 5 minutes
        return () => clearInterval(interval);
      }, [salesLeads, serviceTickets, inspections, submissions, user, crmUsers]);

      return alerts;
    }

    // ─── ROLE SYSTEM (dynamic — Firestore-backed with hardcoded fallback) ───
    const ALL_MODULES = ["daily_digest", "directory", "dispatch", "inspections", "sales", "estimating", "production", "service", "finance", "reports", "calendar", "catalog"];
    const MODULE_LABELS = { daily_digest: "Daily Digest", directory: "Directory", dispatch: "Dispatch", sales: "Project Sales", estimating: "Estimating", production: "Production", inspections: "Inspections", catalog: "Catalog", service: "Service", finance: "Finance", reports: "Reports", calendar: "Calendar" };
    const MODULE_ICONS = { daily_digest: "📅", directory: "📇", dispatch: "📡", sales: "💼", estimating: "📐", production: "🏗️", inspections: "🔍", catalog: "📦", service: "🔧", finance: "💰", reports: "📊", calendar: "📆" };

    const ROLE_PRESETS = {
      admin: { label: "Admin", modules: ALL_MODULES, color: "#E63946" },
      estimator: { label: "Estimator", modules: ["daily_digest", "directory", "sales", "estimating", "catalog"], color: "#3B82F6" },
      lead_estimator: { label: "Lead Estimator", modules: ["daily_digest", "directory", "sales", "estimating", "catalog", "production"], color: "#2563EB" },
      coordinator: { label: "Coordinator", modules: ["daily_digest", "directory", "dispatch", "sales", "production", "inspections", "service", "reports", "calendar"], color: "#10B981" },
      superintendent: { label: "Superintendent", modules: ["daily_digest", "directory", "dispatch", "production", "inspections", "service"], color: "#F59E0B" },
    };
    const ROLE_COLORS = { admin: "#E63946", estimator: "#3B82F6", lead_estimator: "#2563EB", coordinator: "#10B981", superintendent: "#F59E0B" };

    // Hardcoded fallback — used if Firestore user record doesn't exist yet
    const DEFAULT_ROLE_MAP = {
      "zach@colonyroofers.com": "admin",
      "zachreececpa@gmail.com": "admin",
      "brayleigh@colonyroofers.com": "coordinator",
      "lucio@colonyroofers.com": "superintendent",
      "derrick@colonyroofers.com": "superintendent",
      "joseph@colonyroofers.com": "estimator",
      "jgarside@colonyroofers.com": "estimator",
    };
    const ROLES = ROLE_PRESETS; // backward compat
    const getUserRole = (email) => DEFAULT_ROLE_MAP[email?.toLowerCase()] || "admin";
    const canAccess = (role, module) => ROLE_PRESETS[role]?.modules.includes(module) || false;

    // ─── SHARED CONSTANTS ──────────────────────────────────────
    const C = {
      navy: "#1B2A4A", navyLight: "#263B66", navyDark: "#111D35",
      red: "#E63946", redDark: "#C5303C",
      white: "#FFFFFF", gray50: "#F8FAFC", gray100: "#F1F5F9", gray200: "#E2E8F0",
      gray300: "#CBD5E1", gray400: "#94A3B8", gray500: "#64748B", gray600: "#475569", gray700: "#334155",
      green: "#10B981", greenBg: "#D1FAE5",
      yellow: "#F59E0B", yellowBg: "#FEF3C7",
      redBg: "#FEE2E5", blueBg: "#DBEAFE", blue: "#3B82F6",
    };

    const MARKETS = ["ATL", "TPA", "DFW"];
    const MARKET_LABELS = { ATL: "Atlanta", TPA: "Tampa", DFW: "Dallas" };
    const MARKET_INFO = {
      atlanta: { name: "Colony Roofers - Atlanta", phone: "(678) 515-9795", address: "260 Peachtree St. NW Atlanta, GA 30303", state: "Georgia" },
      tampa: { name: "Colony Roofers - Tampa", phone: "(813) 551-0707", address: "Tampa, FL", state: "Florida" },
      dallas: { name: "Colony Roofers - Dallas", phone: "(972) 985-4099", address: "Dallas, TX", state: "Texas" },
    };

    const generateId = () => Math.random().toString(36).substring(2, 10);
    const formatCurrency = (val) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(val);
    const fmt = (n) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(n);

    // ─── SHARED SMALL COMPONENTS ───────────────────────────────
    const Spinner = ({ size = 16, color = C.white }) => (
      <span style={{ display: "inline-block", width: size, height: size, border: `2px solid ${color}40`, borderTopColor: color, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
    );

    const GoogleLogo = () => (
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
    );

    // ─── ACTIVITY TIMELINE COMPONENT ───────────────────────────
    function ActivityTimeline({ activities = [], emails = [], documents = [], inspections = [] }) {
      const timeline = useMemo(() => {
        const items = [];
        activities.forEach(a => items.push({ at: a.at, text: a.text || a.note, by: a.by, icon: "📝", source: "activity" }));
        emails.forEach(e => items.push({ at: e.sentAt || e.receivedAt || e.at, text: `${e.direction === "inbound" ? "Received" : "Sent"}: ${e.subject}`, by: e.from || e.by, icon: e.direction === "inbound" ? "📨" : "📧", source: "email" }));
        documents.forEach(d => items.push({ at: d.uploadedAt || d.at, text: `Document: ${d.name}`, by: d.uploadedBy || d.by, icon: "📎", source: "document" }));
        inspections.forEach(i => items.push({ at: i.scheduledDate || i.createdAt, text: `Inspection: ${i.status} — ${i.inspector}`, by: i.inspector, icon: "🔍", source: "inspection" }));
        return items.filter(i => i.at).sort((a, b) => new Date(b.at) - new Date(a.at));
      }, [activities, emails, documents, inspections]);

      if (!timeline.length) return React.createElement("div", { style: { padding: 20, textAlign: "center", color: C.gray400, fontSize: 13 } }, "No activity yet");

      return React.createElement("div", null, timeline.map((item, i) =>
        React.createElement("div", { key: i, style: { display: "flex", gap: 10, padding: "8px 0", borderBottom: `1px solid ${C.gray100}` } },
          React.createElement("span", { style: { fontSize: 14, width: 24, textAlign: "center" } }, item.icon),
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { style: { fontSize: 12, color: C.navy } }, item.text),
            React.createElement("div", { style: { fontSize: 10, color: C.gray400 } }, (item.by ? item.by + " · " : "") + new Date(item.at).toLocaleString())
          )
        )
      ));
    }

    // ─── DUPLICATE DETECTION ───────────────────────────────────
    function checkDuplicates(type, data, existingList) {
      const matches = [];
      if (type === "company") {
        (existingList || []).forEach(c => {
          if (!data.name || !c.name) return;
          const nameMatch = c.name.toLowerCase().includes(data.name.toLowerCase().slice(0, 5));
          const phoneMatch = c.phone && data.phone && c.phone.replace(/\D/g, "") === data.phone.replace(/\D/g, "");
          if (nameMatch || phoneMatch) matches.push({ ...c, matchType: nameMatch ? "name" : "phone" });
        });
      }
      if (type === "contact") {
        (existingList || []).forEach(c => {
          const emailMatch = c.email && data.email && c.email.toLowerCase() === data.email.toLowerCase();
          const phoneMatch = c.phone && data.phone && c.phone.replace(/\D/g, "") === data.phone.replace(/\D/g, "");
          const nameMatch = c.name && data.name && c.name.toLowerCase() === data.name.toLowerCase();
          if (emailMatch || phoneMatch || nameMatch) matches.push({ ...c, matchType: emailMatch ? "email" : phoneMatch ? "phone" : "name" });
        });
      }
      return matches;
    }

    function DuplicateWarning({ duplicates }) {
      if (!duplicates || !duplicates.length) return null;
      return React.createElement("div", { style: { padding: "10px 14px", borderRadius: 8, background: C.yellowBg, border: `1px solid ${C.yellow}40`, marginBottom: 12, fontSize: 12, color: "#92400E" } },
        React.createElement("strong", null, "⚠️ Possible duplicates: "),
        duplicates.map(d => d.name + " (" + d.matchType + ")").join(", ")
      );
    }

    // ─── CSV IMPORTER ──────────────────────────────────────────
    function CSVImporter({ type, onImport }) {
      const fileRef = useRef(null);
      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const rows = evt.target.result.split("\n").map(r => r.split(",").map(c => c.trim().replace(/^"|"$/g, "")));
          const headers = rows[0].map(h => h.toLowerCase().replace(/\s+/g, ""));
          const items = rows.slice(1).filter(r => r.length >= 2 && r.some(c => c)).map(r => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = r[i] || ""; });
            return { ...obj, id: generateId(), createdAt: new Date().toISOString() };
          });
          if (items.length && confirm("Import " + items.length + " " + type + "s?")) onImport(items);
        };
        reader.readAsText(file);
      };
      return React.createElement(React.Fragment, null,
        React.createElement("input", { ref: fileRef, type: "file", accept: ".csv", onChange: handleFile, style: { display: "none" } }),
        React.createElement("button", { onClick: () => fileRef.current?.click(), style: { padding: "6px 14px", borderRadius: 6, border: "1px solid " + C.gray300, background: C.white, color: C.gray600, fontSize: 11, fontWeight: 600, cursor: "pointer" } }, "📥 Import CSV")
      );
    }

    // ─── DOCUMENT UPLOAD & LIST COMPONENTS ────────────────────────────
    function DocumentUpload({ entityType, entityId, user, onUploaded }) {
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);
      const fileRef = useRef(null);
      const handleUpload = async (file) => {
        if (!firebaseStorage || !file) return;
        setUploading(true);
        const path = "documents/" + entityType + "/" + entityId + "/" + Date.now() + "_" + file.name;
        const ref = firebaseStorage.ref(path);
        const task = ref.put(file);
        task.on("state_changed",
          (snap) => setProgress(Math.round(snap.bytesTransferred / snap.totalBytes * 100)),
          (err) => { console.error(err); setUploading(false); },
          async () => {
            const url = await task.snapshot.ref.getDownloadURL();
            const doc = { id: generateId(), name: file.name, fileName: file.name, fileUrl: url, storagePath: path, fileSize: file.size, fileType: file.type, entityType, entityId, uploadedBy: user?.name || "Unknown", uploadedAt: new Date().toISOString(), category: "other", tags: [], notes: "" };
            if (firestoreDb) await firestoreDb.collection("cr_documents").doc(doc.id).set(doc);
            setUploading(false); setProgress(0);
            if (onUploaded) onUploaded(doc);
          }
        );
      };
      return React.createElement("div", { style: { border: "2px dashed " + C.gray300, borderRadius: 8, padding: 20, textAlign: "center", cursor: "pointer", background: C.gray50 }, onClick: () => !uploading && fileRef.current?.click() },
        React.createElement("input", { ref: fileRef, type: "file", onChange: (e) => e.target.files[0] && handleUpload(e.target.files[0]), style: { display: "none" } }),
        uploading ? React.createElement("div", null,
          React.createElement("div", { style: { fontSize: 12, color: C.navy, marginBottom: 8 } }, "Uploading... " + progress + "%"),
          React.createElement("div", { style: { height: 4, borderRadius: 2, background: C.gray200 } },
            React.createElement("div", { style: { height: 4, borderRadius: 2, background: C.blue, width: progress + "%", transition: "width 0.3s" } })
          )
        ) : React.createElement("div", null,
          React.createElement("div", { style: { fontSize: 24, marginBottom: 4 } }, "📁"),
          React.createElement("div", { style: { fontSize: 12, color: C.gray500 } }, "Click to upload a file")
        )

    // --- Calculation Engine ---
    function calcWastePercent(bldg) {
      const sq = bldg.totalArea / 100;
      if (sq === 0) return 0.15;
      const raw = ((bldg.hips * 2 + bldg.valleys * 3 + bldg.stepFlashing + bldg.rakes) / sq - 3) * 0.82 + 3;
      return Math.max(raw, 0) / 100;
    }
    function calcBuildingMaterials(bldg, mat, waste) {
      const a = bldg.totalArea, aw = a * (1 + waste);
      return {
        shingleBndl: Math.ceil((aw / 100) * 3), hipRidgeBndl: Math.ceil((bldg.hips + bldg.ridges) / 25),
        starterBndl: Math.ceil((bldg.rakes + bldg.eaves) / 116), underlaymentRoll: Math.ceil(a / 950),
        iceWaterRoll: Math.ceil((bldg.valleys + bldg.stepFlashing) / 62), ridgeVentEach: Math.ceil(bldg.ridges / 4),
        stepFlashingBox: Math.ceil(bldg.stepFlashing / 60), dripEdgeEach: Math.ceil((bldg.eaves + bldg.rakes) / 9.5),
        coilNailBox: Math.round((aw / 100) * 400 / 7200), capNailBox: Math.round(aw / 2000),
        pipeBootEach: bldg.pipes, touchPaintEach: bldg.pipes, np1Each: bldg.pipes,
      };
    }
    function calcMaterialCost(q, m) {
      return q.shingleBndl*m.shinglePrice + q.hipRidgeBndl*m.hipRidgePrice + q.starterBndl*m.starterPrice +
        q.underlaymentRoll*m.underlaymentPrice + q.iceWaterRoll*m.iceWaterPrice + q.ridgeVentEach*m.ridgeVentPrice +
        q.stepFlashingBox*m.stepFlashingPrice + q.dripEdgeEach*m.dripEdgePrice + q.coilNailBox*m.coilNailPrice +
        q.capNailBox*m.capNailPrice + q.pipeBootEach*m.pipeBootPrice + q.touchPaintEach*m.touchPaintPrice + q.np1Each*m.np1Price;
    }
    function calcAllBuildings(buildings, materials, labor, equipment, financials) {
      const n = buildings.length;
      if (n === 0) return [];
      const fPer = equipment.forkliftCost/n, dPer = equipment.dumpsterCost/n;
      const pPer = equipment.includePermit ? equipment.permitCost/n : 0;
      const osbPer = (labor.osbSheets * (labor.osbMaterial + labor.osbLabor)) / n;
      return buildings.map(bldg => {
        const waste = calcWastePercent(bldg);
        const qtys = calcBuildingMaterials(bldg, materials, waste);
        const matCost = calcMaterialCost(qtys, materials);
        const sq = Math.ceil(bldg.totalArea / 100);
        const labCost = labor.tearOffRate * sq + fPer + dPer + pPer + osbPer;
        const warCost = equipment.extendedWarranty ? equipment.warrantyPerSq * sq : 0;
        const totalLabEquip = labCost + warCost;
        const matTax = matCost * financials.taxRate;
        const sub = matCost + totalLabEquip + matTax;
        const margin = sub / (1 - financials.margin) - sub;
        const total = sub + margin;
        const sqW = bldg.totalArea * (1 + waste) / 100;
        return { siteplanNum: bldg.siteplanNum, phase: bldg.phase, waste, qtys, materialCost: matCost, laborCost: totalLabEquip, materialTax: matTax, marginAmt: margin, totalPrice: total, pricePerSq: sqW > 0 ? total / sqW : 0, squaresWithWaste: sqW };
      });
    }

    // ─── SHARED: Searchable Select (typeahead for directory linking) ──
    function SearchableSelect({ options, value, onChange, placeholder, required, emptyMsg }) {
      const [search, setSearch] = useState("");
      const [open, setOpen] = useState(false);
      const [focused, setFocused] = useState(-1);
      const wrapRef = useRef(null);
      const inputRef = useRef(null);
      const listRef = useRef(null);
      const selectedOption = options.find(o => o.value === value);
      const filtered = search ? options.filter(o => o.label.toLowerCase().includes(search.toLowerCase()) || (o.sub || "").toLowerCase().includes(search.toLowerCase())) : options;
      useEffect(() => { const h = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) { setOpen(false); setSearch(""); } }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
      useEffect(() => { if (focused >= 0 && listRef.current?.children[focused]) listRef.current.children[focused].scrollIntoView({ block: "nearest" }); }, [focused]);
      const handleKeyDown = (e) => {
        if (e.key === "ArrowDown") { e.preventDefault(); setFocused(f => Math.min(f + 1, filtered.length - 1)); if (!open) setOpen(true); }
        else if (e.key === "ArrowUp") { e.preventDefault(); setFocused(f => Math.max(f - 1, 0)); }
        else if (e.key === "Enter" && focused >= 0 && filtered[focused]) { e.preventDefault(); onChange(filtered[focused].value); setSearch(""); setOpen(false); setFocused(-1); }
        else if (e.key === "Escape") { setOpen(false); setSearch(""); setFocused(-1); }
      };
      const sfs = { width: "100%", padding: "8px 10px", border: `1px solid ${required && !value ? C.red + "60" : C.gray300}`, borderRadius: 6, fontSize: 13, color: C.navy, outline: "none", boxSizing: "border-box", background: C.white };
      return (
        <div ref={wrapRef} style={{ position: "relative" }}>
          <div style={{ ...sfs, display: "flex", alignItems: "center", gap: 6, padding: "0 8px", cursor: "text" }} onClick={() => { setOpen(true); inputRef.current?.focus(); }}>
            {value && !open ? (<React.Fragment><span style={{ flex: 1, padding: "8px 0", fontSize: 13, color: C.navy, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{selectedOption?.label || value}</span><span onClick={e => { e.stopPropagation(); onChange(""); setSearch(""); inputRef.current?.focus(); }} style={{ cursor: "pointer", color: C.gray400, fontSize: 12, padding: "2px 4px", flexShrink: 0 }}>×</span></React.Fragment>
            ) : (<input ref={inputRef} value={search} onChange={e => { setSearch(e.target.value); setOpen(true); setFocused(0); }} onFocus={() => setOpen(true)} onKeyDown={handleKeyDown} placeholder={value ? (selectedOption?.label || "") : (placeholder || "Search...")} style={{ border: "none", outline: "none", flex: 1, fontSize: 13, color: C.navy, background: "transparent", padding: "8px 0" }} />)}
            <span style={{ color: C.gray400, fontSize: 8, flexShrink: 0 }}>▼</span>
          </div>
          {open && (<div ref={listRef} style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 3000, background: C.white, border: `1px solid ${C.gray300}`, borderRadius: "0 0 6px 6px", boxShadow: "0 8px 24px rgba(0,0,0,0.12)", maxHeight: 200, overflowY: "auto", marginTop: -1 }}>
            {filtered.length === 0 ? (<div style={{ padding: "10px 12px", fontSize: 12, color: C.gray400, textAlign: "center" }}>{emptyMsg || "No matches"}</div>
            ) : filtered.map((o, i) => (<div key={o.value} onClick={() => { onChange(o.value); setSearch(""); setOpen(false); setFocused(-1); }} style={{ padding: "8px 12px", cursor: "pointer", fontSize: 12, color: C.navy, background: i === focused ? C.gray100 : "transparent", borderBottom: `1px solid ${C.gray50}` }} onMouseEnter={() => setFocused(i)}><div style={{ fontWeight: 600 }}>{o.label}</div>{o.sub && <div style={{ fontSize: 10, color: C.gray400, marginTop: 1 }}>{o.sub}</div>}</div>))}
          </div>)}
        </div>
      );
    }

    function EstimatingModule({ user, role, entities, salesLeads, setSalesLeads, crmUsers }) {

      const [filter, setFilter] = useState("all");
      const [trackerSort, setTrackerSort] = useState("date");
      const [expandedEstimate, setExpandedEstimate] = useState(null);
      const [draggedJobId, setDraggedJobId] = useState(null);
      const [selectedKanbanJob, setSelectedKanbanJob] = useState(null);
      const [showProposalGen, setShowProposalGen] = useState(null); // estimate id
      const [proposalSystem, setProposalSystem] = useState("");
      const [proposalSOW, setProposalSOW] = useState("");
      const [catalogSystems] = useFirestoreCollection("cr_systems", []);

      const handleKanbanDragStart = (e, jobId) => { setDraggedJobId(jobId); e.dataTransfer.effectAllowed = "move"; };
      const handleKanbanDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
      const handleKanbanDrop = (e, targetColId) => {
        e.preventDefault();
        if (!draggedJobId) return;
        const job = estimatingJobs.find(j => j.id === draggedJobId);
        if (!job) { setDraggedJobId(null); return; }
        const jobEsts = estimatesForLead(job.id);
        const jobApproved = approvedForLead(job.id);
        const jobPending = pendingForLead(job.id);
        // Determine current column using estimatingPhase or computed
        const getCol = (j) => {
          if (j.estimatingPhase) return j.estimatingPhase;
          return !j.estimator ? "unassigned" : (approvedForLead(j.id).length > 0 ? "approved" : (pendingForLead(j.id).length > 0 ? "in_progress" : "assigned"));
        };
        const currentCol = getCol(job);
        if (targetColId === currentCol) { setDraggedJobId(null); return; }
        // Set the estimatingPhase on the lead to move it to the target column
        const setPhase = (phase) => {
          setSalesLeads(prev => prev.map(l => l.id === job.id ? { ...l, estimatingPhase: phase, activities: [...(l.activities || []), { type: "phase_change", text: `Moved to ${phase} on estimating board`, by: user.name, at: new Date().toISOString() }] } : l));
        };
        if (targetColId === "unassigned") {
          if (job.estimator && confirm("Remove estimator assignment?")) { handleAssignEstimator(job.id, ""); }
          setPhase("unassigned");
        } else if (targetColId === "assigned") {
          if (!job.estimator) {
            // Open the card detail modal so user can assign via dropdown
            setSelectedKanbanJob(job);
            alert("Please assign an estimator using the dropdown in the card detail.");
          }
          setPhase("assigned");
        } else if (targetColId === "in_progress") {
          if (!job.estimator) {
            setSelectedKanbanJob(job);
            alert("Please assign an estimator using the dropdown in the card detail first.");
          }
          setPhase("in_progress");
        } else if (targetColId === "approved") {
          if (jobPending.length > 0 && (role === "admin" || role === "lead_estimator")) {
            if (confirm(`Approve ${jobPending.length} pending estimate(s)?`)) { jobPending.forEach(est => handleApprove(est)); }
            setPhase("approved");
          } else if (jobPending.length > 0) {
            alert("Only admins or lead estimators can approve estimates.");
          } else if (jobEsts.length === 0) {
            alert("Create and submit an estimate before approving.");
          } else {
            setPhase("approved");
          }
        }
        setDraggedJobId(null);

      const handleUpdateJobField = (jobId, field, value) => {
        setSalesLeads(prev => prev.map(l => l.id === jobId ? { ...l, [field]: value, activities: [...(l.activities || []), { type: "field_update", text: `Updated ${field} to "${value}"`, by: user.name, at: new Date().toISOString() }] } : l));

      const approvedForLead = (leadId) => submissions.filter(s => s.leadId === leadId && s.status === "approved");
      const pendingForLead = (leadId) => submissions.filter(s => s.leadId === leadId && s.status === "pending");

      const getJobCol = (j) => {
        if (j.estimatingPhase) return j.estimatingPhase;

      const counts = { all: submissions.length, pending: submissions.filter(s => s.status === "pending").length, approved: submissions.filter(s => s.status === "approved").length, awarded: submissions.filter(s => s.status === "awarded").length };
      const filteredSubs = filter === "all" ? submissions : submissions.filter(s => s.status === filter);

      // Available jobs for estimate creation
      const availableJobs = (salesLeads || []).filter(l => l.stage === "being_estimated");
      const selectedLead = availableJobs.find(l => l.id === selectedLeadId);
      const leadCompany = selectedLead ? (companies || []).find(c => c.id === selectedLead.companyId) : null;

      const leadContact = selectedLead ? (contacts || []).find(c => c.id === selectedLead.contactId) : null;

      // Calculations
      const results = calcAllBuildings(buildings, materials, labor, equipment, financials);
      const grandTotal = results.reduce((s, r) => s + r.totalPrice, 0);
      const totalSq = buildings.reduce((s, b) => s + b.totalArea, 0);

      const handleAward = async (sub) => {
        const leadEstimates = submissions.filter(s => s.leadId === sub.leadId && s.status === "approved");
        if (leadEstimates.length > 1) { setShowAwardPicker(sub.leadId); return; }
        await doAward(sub);
      };

      const doAward = async (sub) => {
        if (!confirm(`Award "${sub.leadName || sub.project?.jobName}" and move to Production?`)) return;
        const updated = { ...sub, status: "awarded", awardedAt: new Date().toISOString(), awardedBy: user.name };
        await saveSubmission(updated);
        for (const other of submissions.filter(s => s.leadId === sub.leadId && s.id !== sub.id && s.status === "approved")) {
          await saveSubmission({ ...other, status: "not_selected" });
        }
        const totalPrice = sub.totalPrice || sub.results?.reduce((s, r) => s + r.totalPrice, 0) || 0;
        const totalMat = sub.results?.reduce((s, r) => s + r.materialCost, 0) || 0;
        const totalLab = sub.results?.reduce((s, r) => s + r.laborCost, 0) || 0;
        const totalTax = sub.results?.reduce((s, r) => s + r.materialTax, 0) || 0;
        const estimatedCost = totalMat + totalLab + totalTax;
        const margin = totalPrice > 0 ? Math.round(((totalPrice - estimatedCost) / totalPrice) * 100) : 0;

                          <div style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50 }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600, marginBottom: 4 }}>Estimator</div><select value={job.estimator || ""} onChange={e => handleUpdateJobField(job.id, "estimator", e.target.value)} style={{ width: "100%", padding: "4px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: C.navy, background: C.white }}><option value="">— Select —</option>{(crmUsers || []).map(u => <option key={u.id} value={u.name}>{u.name}{u.role ? ` (${u.role})` : ""}</option>)}</select></div>
                          <div style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50 }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600, marginBottom: 4 }}>Bid Due</div><input type="date" value={job.bidDueDate || ""} onChange={e => handleUpdateJobField(job.id, "bidDueDate", e.target.value)} style={{ width: "100%", padding: "4px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: C.navy, background: C.white }} /></div>
                          <div style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50 }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600, marginBottom: 4 }}>Type</div><select value={job.constructionType || ""} onChange={e => handleUpdateJobField(job.id, "constructionType", e.target.value)} style={{ width: "100%", padding: "4px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: C.navy, background: C.white }}><option value="">— Select —</option><option value="Replacement">Replacement</option><option value="New Construction">New Construction</option></select></div>
                          <div style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50 }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600, marginBottom: 4 }}>Roof Slope</div><select value={job.roofSlope || ""} onChange={e => handleUpdateJobField(job.id, "roofSlope", e.target.value)} style={{ width: "100%", padding: "4px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: C.navy, background: C.white }}><option value="">— Select —</option><option value="Steep Slope">Steep Slope</option><option value="Low-Slope">Low-Slope</option></select></div>
                          <div style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50 }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600, marginBottom: 4 }}>Material</div><select value={job.estimateMaterial || ""} onChange={e => handleUpdateJobField(job.id, "estimateMaterial", e.target.value)} style={{ width: "100%", padding: "4px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: C.navy, background: C.white }}><option value="">— Select —</option><option value="Shingles">Shingles</option><option value="Tile">Tile</option><option value="TPO">TPO</option><option value="Combo">Combo</option><option value="Metal">Metal</option><option value="Modified Bitumen">Modified Bitumen</option><option value="EPDM">EPDM</option><option value="PVC">PVC</option></select></div>
                        </div>
                        {/* Scope & Notes */}
                        {(job.scopeOfWork || job.estimatingNotes) && <div style={{ marginBottom: 20, padding: "12px 14px", borderRadius: 8, background: C.blueBg + "30", border: `1px solid ${C.blue}15` }}>
                          {job.scopeOfWork && <div style={{ fontSize: 12, color: C.navy, marginBottom: job.estimatingNotes ? 6 : 0 }}><span style={{ fontWeight: 700 }}>Scope:</span> {job.scopeOfWork}</div>}
                          {job.estimatingNotes && <div style={{ fontSize: 12, color: C.gray600 }}><span style={{ fontWeight: 700 }}>Notes:</span> {job.estimatingNotes}</div>}
                        </div>}
                        {/* Contact */}
                        {ct && <div style={{ marginBottom: 20, padding: "10px 14px", borderRadius: 8, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600, marginBottom: 4 }}>Primary Contact</div><div style={{ fontSize: 13, fontWeight: 600, color: C.navy }}>{ct.firstName} {ct.lastName}</div>{ct.email && <div style={{ fontSize: 11, color: C.gray500 }}>{ct.email}</div>}{ct.mobilePhone && <div style={{ fontSize: 11, color: C.gray500 }}>{ct.mobilePhone}</div>}</div>}

                            <button onClick={() => { setSelectedKanbanJob(null); startEstimate(job.id); }} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: C.red, color: C.white, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{jobEstimates.length > 0 ? "+ Add Estimate" : "Create Estimate"}</button>
                          </div>
                          {jobEstimates.length === 0 ? (
                            <div style={{ padding: 20, textAlign: "center", color: C.gray400, fontSize: 12, background: C.gray50, borderRadius: 8 }}>No estimates yet</div>

                                <div><span style={{ fontSize: 14, fontWeight: 700, color: C.navy }}>{fmt(est.totalPrice || 0)}</span><span style={{ marginLeft: 8, padding: "2px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, textTransform: "uppercase", background: est.status === "approved" ? C.greenBg : est.status === "awarded" ? C.blueBg : C.yellowBg, color: est.status === "approved" ? C.green : est.status === "awarded" ? C.blue : C.yellow }}>{est.status}</span></div>
                                <div style={{ display: "flex", gap: 4 }}>

                                  {est.status === "pending" && (role === "admin" || role === "lead_estimator") && <button onClick={() => { handleApprove(est); setSelectedKanbanJob(null); }} style={{ padding: "4px 10px", borderRadius: 5, border: "none", background: C.green, color: C.white, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>✓ Approve</button>}
                                  {est.status === "approved" && <button onClick={() => { handleAward(est); setSelectedKanbanJob(null); }} style={{ padding: "4px 10px", borderRadius: 5, border: "none", background: C.blue, color: C.white, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>🏆 Award</button>}
                                </div>
                              </div>
                              <div style={{ fontSize: 11, color: C.gray500 }}>{est.buildings?.length || 0} buildings · by {est.submittedBy || "—"} · {new Date(est.createdAt).toLocaleDateString()}</div>
                              {est.status === "approved" && <button onClick={() => { setShowProposalGen(est.id); setProposalSOW(""); setProposalSystem(""); }} style={{ padding: "4px 10px", borderRadius: 5, border: `1px solid ${C.navy}`, background: C.white, color: C.navy, fontSize: 10, fontWeight: 700, cursor: "pointer", marginTop: 4 }}>📄 Generate Proposal</button>}
                              {est.submittedForApproval && <div style={{ fontSize: 10, color: C.blue, fontWeight: 600, marginTop: 4 }}>📤 Submitted for approval {est.submittedForApprovalAt ? `on ${new Date(est.submittedForApprovalAt).toLocaleDateString()}` : ""} by {est.submittedForApprovalBy || "—"}</div>}
                              {/* Proposal Generator */}
                              {showProposalGen === est.id && (
                                <div style={{ marginTop: 10, padding: "12px 14px", borderRadius: 8, border: `1px solid ${C.navy}30`, background: C.gray50 }}>
                                  <div style={{ fontSize: 12, fontWeight: 700, color: C.navy, marginBottom: 8 }}>📄 Generate Proposal</div>
                                  <div style={{ marginBottom: 8 }}>
                                    <label style={{ fontSize: 10, fontWeight: 600, color: C.gray500, display: "block", marginBottom: 4 }}>Select Roof System from Catalog</label>
                                    <select value={proposalSystem} onChange={e => { setProposalSystem(e.target.value); const sys = catalogSystems.find(s => s.id === e.target.value); if (sys?.standardSOW) setProposalSOW(sys.standardSOW); }} style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, color: C.navy }}>
                                      <option value="">— Select system —</option>
                                      {catalogSystems.map(sys => <option key={sys.id} value={sys.id}>{sys.name}</option>)}
                                    </select>
                                  </div>
                                  <div style={{ marginBottom: 8 }}>
                                    <label style={{ fontSize: 10, fontWeight: 600, color: C.gray500, display: "block", marginBottom: 4 }}>Scope of Work {proposalSystem && "(auto-populated from system)"}</label>
                                    <textarea value={proposalSOW} onChange={e => setProposalSOW(e.target.value)} style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, color: C.navy, minHeight: 80, resize: "vertical", boxSizing: "border-box" }} placeholder="Scope of work will auto-populate when you select a roof system..." />
                                  </div>
                                  <div style={{ display: "flex", gap: 6, justifyContent: "flex-end" }}>
                                    <button onClick={() => setShowProposalGen(null)} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${C.gray300}`, background: C.white, color: C.gray600, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                                    <button onClick={() => {
                                      const sys = catalogSystems.find(s => s.id === proposalSystem);
                                      const proposal = { id: generateId(), estimateId: est.id, systemName: sys?.name || "Custom", sow: proposalSOW, total: est.totalPrice, createdAt: new Date().toISOString(), createdBy: user.name };
                                      const updatedEst = { ...est, proposal };
                                      saveSubmission(updatedEst).then(() => { refresh(); setShowProposalGen(null); alert("Proposal generated and attached to estimate."); });
                                    }} disabled={!proposalSOW.trim()} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: proposalSOW.trim() ? C.green : C.gray300, color: proposalSOW.trim() ? C.white : C.gray400, fontSize: 11, fontWeight: 600, cursor: proposalSOW.trim() ? "pointer" : "default" }}>Generate Proposal</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                        {/* Vendor Pricing Requests */}
                        <VendorPricingRequests job={job} user={user} entities={entities} setSalesLeads={setSalesLeads} />
                        {/* Activity log */}
                        {job.activities && job.activities.length > 0 && <div>
                          <span style={{ fontSize: 12, fontWeight: 700, color: C.gray400, display: "block", marginBottom: 8 }}>Activity</span>
                          {job.activities.slice(-5).reverse().map((a, i) => (
                            <div key={i} style={{ fontSize: 11, color: C.gray500, padding: "4px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontWeight: 600 }}>{a.by}</span> — {a.text} <span style={{ color: C.gray400, marginLeft: 4 }}>{new Date(a.at).toLocaleDateString()}</span></div>
                          ))}
                        </div>}
                        {/* Tasks */}
                        <div style={{ marginTop: 16 }}><TasksPanel objectType="estimate_job" objectId={job.id} user={user} crmUsers={crmUsers} /></div>
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Beam AI placeholder */}
              <div style={{ marginTop: 32, padding: "24px", borderRadius: 10, border: `2px dashed ${C.gray300}`, textAlign: "center" }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: C.navy, margin: "0 0 8px" }}>Low-Slope Estimates (Beam AI)</h3>
                <p style={{ fontSize: 13, color: C.gray500, margin: "0 0 16px" }}>Import takeoffs from Beam AI for TPO, single-ply, and modified bitumen projects</p>
                <button style={{ padding: "10px 24px", borderRadius: 8, border: `1px solid ${C.navy}30`, background: C.navy + "08", color: C.navy, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>📥 Import from Beam AI (Coming Soon)</button>
              </div>
            </div>
          </div>
        );
      }

      // ════════════════════════════════════════════════════════════
      // NEW ESTIMATE WIZARD
      // ════════════════════════════════════════════════════════════
      if (view === "new") {
        return (
          <div style={{ maxWidth: 1000, margin: "0 auto", padding: "24px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div><h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: C.navy }}>New Estimate{estimateRoofType ? ` — ${estimateRoofType}` : ""}{selectedLead?.constructionType ? ` ${selectedLead.constructionType}` : ""}</h2><p style={{ margin: "4px 0 0", fontSize: 13, color: C.gray500 }}>Step {step} of 4</p></div>
              <button onClick={() => setView("kanban")} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${C.gray300}`, background: C.white, color: C.gray600, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>← Back to Board</button>
            </div>
            <div style={{ display: "flex", gap: 4, marginBottom: 24 }}>
              {["Select Job", "Buildings", "Pricing", "Review"].map((s, i) => (
                <button key={i} onClick={() => setStep(i + 1)} style={{ flex: 1, padding: "10px 0", borderRadius: 8, border: "none", background: step === i + 1 ? C.navy : step > i + 1 ? C.green + "20" : C.gray100, color: step === i + 1 ? C.white : step > i + 1 ? C.green : C.gray500, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{i + 1}. {s}</button>
              ))}
            </div>

            {/* STEP 1: Select Job */}
            {step === 1 && (
              <div style={{ background: C.white, borderRadius: 10, padding: 24, border: `1px solid ${C.gray200}` }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: C.navy, margin: "0 0 4px" }}>Select Job</h3>
                <p style={{ fontSize: 12, color: C.gray500, margin: "0 0 16px" }}>Choose a job that's in "Being Estimated" status.</p>
                <select style={{ ...fs, fontWeight: 600 }} value={selectedLeadId} onChange={e => { setSelectedLeadId(e.target.value); const lead = availableJobs.find(l => l.id === e.target.value); if (lead) { const mat = (lead.estimateMaterial || "").toLowerCase(); const autoType = mat.includes("shingle") ? "Shingle" : mat.includes("tile") ? "Tile" : mat.includes("tpo") ? "TPO" : mat.includes("combo") ? "Combo" : ""; setEstimateRoofType(autoType || "Shingle"); } else { setEstimateRoofType(""); } }}>
                  <option value="">— Select a job —</option>
                  {availableJobs.map(l => { const co = (companies || []).find(c => c.id === l.companyId); const pr = (properties || []).find(p => p.id === l.propertyId); const estCount = estimatesForLead(l.id).length; return (<option key={l.id} value={l.id}>{l.jobName || co?.name || l.company || "—"} — {pr?.name || "—"}{l.estimator ? ` (${l.estimator})` : ""}{estCount > 0 ? ` [${estCount} est]` : ""}</option>); })}
                </select>
                {selectedLead && (
                  <div style={{ marginTop: 16, padding: "14px 16px", borderRadius: 10, background: C.greenBg + "40", border: `1px solid ${C.green}40` }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.navy, marginBottom: 4 }}>{selectedLead.jobName || leadCompany?.name || selectedLead.company || "—"}</div>
                    {leadProperty && <div style={{ fontSize: 12, color: C.gray600, marginBottom: 2 }}>🏠 {leadProperty.name} — {leadProperty.address || ""}</div>}
                    {leadContact && <div style={{ fontSize: 12, color: C.gray600, marginBottom: 2 }}>👤 {leadContact.name} — {leadContact.email || ""}</div>}
                    {selectedLead.estimator && <div style={{ fontSize: 12, color: C.gray600 }}>📐 Estimator: {selectedLead.estimator}</div>}
                    {/* Estimate type — auto-populated from sales data, editable */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginTop: 10 }}>
                      <div style={{ padding: "8px 10px", borderRadius: 6, background: C.white, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, fontWeight: 700, color: C.gray400, marginBottom: 4 }}>Estimate Type *</div><select value={estimateRoofType} onChange={e => setEstimateRoofType(e.target.value)} style={{ width: "100%", padding: "4px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: C.navy, background: C.white }}><option value="">— Select —</option><option value="Shingle">Shingle</option><option value="Tile">Tile</option><option value="TPO">TPO</option><option value="Combo">Combo</option></select></div>
                      <div style={{ padding: "8px 10px", borderRadius: 6, background: C.white, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, fontWeight: 700, color: C.gray400 }}>Construction</div><div style={{ fontSize: 13, fontWeight: 600, color: C.navy }}>{selectedLead.constructionType || "—"}</div></div>
                      <div style={{ padding: "8px 10px", borderRadius: 6, background: C.white, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, fontWeight: 700, color: C.gray400 }}>Slope</div><div style={{ fontSize: 13, fontWeight: 600, color: C.navy }}>{selectedLead.roofSlope || "—"}</div></div>
                    </div>
                    {selectedLead.scopeOfWork && <div style={{ marginTop: 8, padding: "8px 10px", borderRadius: 6, background: C.white, border: `1px solid ${C.blue}30` }}><div style={{ fontSize: 10, fontWeight: 700, color: C.navy, marginBottom: 2 }}>Scope of Work</div><div style={{ fontSize: 12, color: C.gray600, lineHeight: 1.5 }}>{selectedLead.scopeOfWork}</div></div>}
                    {selectedLead.estimatingNotes && <div style={{ marginTop: 6, padding: "8px 10px", borderRadius: 6, background: C.white, border: `1px solid ${C.yellow}30` }}><div style={{ fontSize: 10, fontWeight: 700, color: C.navy, marginBottom: 2 }}>Notes from Sales</div><div style={{ fontSize: 12, color: C.gray600, lineHeight: 1.5 }}>{selectedLead.estimatingNotes}</div></div>}
                  </div>
                )}
                <div style={{ marginTop: 20, display: "flex", justifyContent: "flex-end" }}>
                  <button onClick={() => setStep(2)} disabled={!selectedLeadId || !estimateRoofType} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: selectedLeadId && estimateRoofType ? C.red : C.gray200, color: selectedLeadId && estimateRoofType ? C.white : C.gray400, fontSize: 13, fontWeight: 600, cursor: selectedLeadId && estimateRoofType ? "pointer" : "default" }}>Next → Buildings</button>
                </div>
              </div>
            )}

            {/* STEP 2: Buildings (spreadsheet layout) */}
            {step === 2 && (
              <div>
                {/* RoofR upload */}
                <div style={{ background: C.white, borderRadius: 10, padding: "14px 20px", border: `2px dashed ${roofRProcessing ? C.blue : C.gray300}`, marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 20 }}>📄</span>
                    <div><div style={{ fontSize: 13, fontWeight: 700, color: C.navy }}>Import from RoofR</div><div style={{ fontSize: 11, color: C.gray500 }}>Upload PDF or Excel to auto-fill</div></div>
                  </div>
                  {roofRProcessing ? <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Spinner size={14} color={C.navy} /><span style={{ fontSize: 12, color: C.navy, fontWeight: 600 }}>Parsing...</span></div> : (
                    <div><button onClick={() => roofRInputRef.current?.click()} style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: C.navy, color: C.white, fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>{I.upload} Upload</button><input ref={roofRInputRef} type="file" accept=".pdf,.xlsx,.xls,.csv,.png,.jpg,.jpeg" style={{ display: "none" }} onChange={e => { if (e.target.files?.[0]) handleRoofRUpload(e.target.files[0]); e.target.value = ""; }} /></div>
                  )}
                </div>
                {roofRError && <div style={{ marginBottom: 12, padding: "8px 14px", borderRadius: 6, background: C.yellowBg, color: C.yellow, fontSize: 12 }}>{roofRError}</div>}

                {/* Spreadsheet table */}
                <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, overflow: "auto" }}>
                  {(() => {
                    const cellStyle = { padding: "0", border: "none", borderRight: `1px solid ${C.gray100}`, borderBottom: `1px solid ${C.gray100}` };
                    const inputStyle = { width: "100%", padding: "7px 6px", border: "none", outline: "none", fontSize: 12, color: C.navy, background: "transparent", boxSizing: "border-box", textAlign: "right" };
                    const textInputStyle = { ...inputStyle, textAlign: "left" };
                    const headerStyle = { padding: "6px 8px", fontSize: 9, fontWeight: 700, color: C.gray400, textTransform: "uppercase", letterSpacing: "0.04em", background: C.gray50, borderRight: `1px solid ${C.gray100}`, borderBottom: `2px solid ${C.gray200}`, whiteSpace: "nowrap", textAlign: "center" };
                    const cols = [
                      { key: "_num", label: "#", w: 32, type: "label" },
                      { key: "siteplanNum", label: "Siteplan", w: 80, type: "text" },
                      { key: "roofrNum", label: "RoofR #", w: 70, type: "text" },
                      { key: "predominantPitch", label: "Pitch", w: 65, type: "select", options: ["4/12","5/12","6/12","7/12","8/12","9/12","10/12","12/12"] },
                      { key: "phase", label: "Phase", w: 50, type: "num" },
                      { key: "pipes", label: "Pipes", w: 50, type: "num" },
                      { key: "totalArea", label: "Total Area", w: 85, type: "num", bold: true },
                      { key: "pitchedArea", label: "Pitched", w: 75, type: "num" },
                      { key: "flatArea", label: "Flat", w: 65, type: "num" },
                      { key: "eaves", label: "Eaves", w: 60, type: "num" },
                      { key: "valleys", label: "Valleys", w: 60, type: "num" },
                      { key: "hips", label: "Hips", w: 55, type: "num" },
                      { key: "ridges", label: "Ridges", w: 60, type: "num" },
                      { key: "rakes", label: "Rakes", w: 60, type: "num" },
                      { key: "wallFlashing", label: "Wall Fl.", w: 60, type: "num" },
                      { key: "stepFlashing", label: "Step Fl.", w: 60, type: "num" },
                      { key: "_sq", label: "Sq", w: 45, type: "calc" },
                      { key: "_del", label: "", w: 30, type: "action" },
                    ];
                    return (
                      <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 1050 }}>
                        <thead><tr>
                          {cols.map(c => <th key={c.key} style={{ ...headerStyle, width: c.w, minWidth: c.w }}>{c.label}</th>)}
                        </tr></thead>
                        <tbody>
                          {buildings.map((b, idx) => (
                            <tr key={b.id || idx} style={{ background: idx % 2 === 0 ? C.white : C.gray50 + "80" }}>
                              {cols.map(c => {
                                if (c.type === "label") return <td key={c.key} style={{ ...cellStyle, padding: "7px 8px", fontSize: 11, fontWeight: 700, color: C.gray500, textAlign: "center" }}>{idx + 1}</td>;

    function ChangeOrderTab({ project, onUpdateProject, user }) {
      const [contractFile, setContractFile] = useState(null);
      const [contractText, setContractText] = useState(project?.contractTemplate || "");
      const [uploading, setUploading] = useState(false);
      const [parsing, setParsing] = useState(false);
      const [contractFormat, setContractFormat] = useState(project?.changeOrderFormat || null);
      const fileRef = useRef(null);
      const role = user?.role || "admin";

      const handleContractUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setContractFile(file);
        setUploading(true);
        setParsing(true);
        try {
          // Upload contract to Firebase Storage
          let downloadURL = "";
          if (firebaseStorage) {
            const storageRef = firebaseStorage.ref(`contracts/${project.id}/${file.name}`);
            const snap = await storageRef.put(file);
            downloadURL = await snap.ref.getDownloadURL();
          }
          // Extract text from PDF or doc
          let extractedText = "";
          if (file.type === "application/pdf" && window.pdfjsLib) {
            const arrayBuf = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
            for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
              const page = await pdf.getPage(i);
              const content = await page.getTextContent();
              extractedText += content.items.map(item => item.str).join(" ") + "\n";
            }
          } else {
            extractedText = await file.text();
          }
          // Parse change order format from contract
          const coSections = extractContractCOFormat(extractedText);
          setContractText(extractedText);
          setContractFormat(coSections);
          // Save to project
          onUpdateProject(project.id, {
            contractTemplate: extractedText,
            contractFileURL: downloadURL,
            contractFileName: file.name,
            changeOrderFormat: coSections
          });
        } catch (err) {
          console.error("Contract upload error:", err);
          alert("Error processing contract: " + err.message);
        } finally {
          setUploading(false);
          setParsing(false);
        }
      };

      // Simple parser to extract change order requirements from contract text
      function extractContractCOFormat(text) {
        const lower = text.toLowerCase();
        const format = {
          detected: true,
          requiresWrittenNotice: lower.includes("written notice") || lower.includes("written request"),
          requiresOwnerApproval: lower.includes("owner approval") || lower.includes("owner's approval") || lower.includes("approved by owner"),
          noticePeriodDays: null,
          requiredFields: ["description", "reason", "amount"],
          pricing_method: null,
          formatNotes: []
        };
        // Detect notice period
        const noticeMatch = text.match(/(\d+)\s*(?:calendar\s*)?days?\s*(?:prior|advance|written)\s*notice/i);
        if (noticeMatch) { format.noticePeriodDays = parseInt(noticeMatch[1]); format.formatNotes.push(`Requires ${noticeMatch[1]}-day advance notice`); }
        // Detect pricing method
        if (lower.includes("time and materials") || lower.includes("t&m")) { format.pricing_method = "time_and_materials"; format.requiredFields.push("laborHours", "materialCost"); format.formatNotes.push("Pricing: Time & Materials"); }
        if (lower.includes("unit price") || lower.includes("per square")) { format.pricing_method = "unit_price"; format.requiredFields.push("unitQuantity", "unitPrice"); format.formatNotes.push("Pricing: Unit Price"); }
        if (lower.includes("lump sum")) { format.pricing_method = "lump_sum"; format.formatNotes.push("Pricing: Lump Sum"); }
        // Detect required documentation
        if (lower.includes("photo") || lower.includes("photograph")) { format.requiredFields.push("photos"); format.formatNotes.push("Photos required"); }
        if (lower.includes("scope of work") || lower.includes("detailed scope")) { format.requiredFields.push("scopeOfWork"); format.formatNotes.push("Detailed scope of work required"); }
        if (lower.includes("schedule impact") || lower.includes("time extension")) { format.requiredFields.push("scheduleImpact"); format.formatNotes.push("Schedule impact assessment required"); }
        if (lower.includes("architect") || lower.includes("engineer")) {
          if (lower.includes("architect approval") || lower.includes("engineer approval")) { format.requiresArchitectApproval = true; format.formatNotes.push("Requires architect/engineer approval"); }
        }
        if (lower.includes("aia g701") || lower.includes("g701")) { format.formatNotes.push("AIA G701 format required"); format.aiaFormat = true; }
        if (lower.includes("aia g702") || lower.includes("g702")) { format.formatNotes.push("AIA G702 continuation sheet"); }
        if (format.formatNotes.length === 0) { format.formatNotes.push("Standard change order format (no specific contract requirements detected)"); }
        return format;
      }

      return React.createElement("div", null,
        // Contract Upload Section
        React.createElement("div", { style: { marginBottom: 24, padding: 20, borderRadius: 10, border: "2px dashed " + (contractFormat ? C.green + "60" : C.gray300), background: contractFormat ? C.greenBg : C.gray50 } },

            React.createElement("div", null,
              React.createElement("h3", { style: { fontSize: 14, fontWeight: 700, color: C.navy, margin: "0 0 4px" } }, "📄 Contract Template"),
              React.createElement("p", { style: { fontSize: 12, color: C.gray500, margin: 0 } },
                contractFormat ? "Contract uploaded — change order format detected" : "Upload the project contract to auto-enforce change order format"
              )
            ),
            React.createElement("button", {
              onClick: () => fileRef.current?.click(),
              style: { padding: "8px 16px", borderRadius: 6, border: "none", background: contractFormat ? C.gray200 : C.navy, color: contractFormat ? C.navy : C.white, fontSize: 12, fontWeight: 600, cursor: "pointer" }
            }, uploading ? "Processing..." : (contractFormat ? "Replace Contract" : "Upload Contract"))
          ),
          React.createElement("input", { ref: fileRef, type: "file", accept: ".pdf,.doc,.docx,.txt", style: { display: "none" }, onChange: handleContractUpload }),
          project?.contractFileName && React.createElement("div", { style: { fontSize: 11, color: C.gray500, marginBottom: 8 } }, "📎 " + project.contractFileName),

          contractFormat && contractFormat.formatNotes?.length > 0 && React.createElement("div", { style: { marginTop: 8, padding: 12, borderRadius: 8, background: C.white, border: "1px solid " + C.gray200 } },
            React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: C.navy, marginBottom: 6 } }, "Detected Change Order Requirements:"),
            contractFormat.formatNotes.map((note, i) =>

                React.createElement("span", { style: { color: C.green } }, "✓"), note
              )
            ),

              "Required fields: " + contractFormat.requiredFields.join(", ")
            )
          )
        ),

        React.createElement(ChangeOrderPanel, { project, onUpdateProject: (updatedProject) => {
          // ChangeOrderPanel passes full project object; extract just the changed fields
          const { id, ...updates } = updatedProject;
          onUpdateProject(project.id, updates);
        }, user, role, contractFormat })
      );
    }

    const MULTI_FILE_TYPES = ["contract", "planSet"];

    function DocumentUploadCard({ type, files, onUpload, onRemove }) {
      const config = DOC_TYPES[type];
      const inputRef = useRef(null);
      const [dragOver, setDragOver] = useState(false);
      const isMulti = MULTI_FILE_TYPES.includes(type);
      const fileList = Array.isArray(files) ? files : files ? [files] : [];
      const hasFiles = fileList.length > 0;
      const anyProcessing = fileList.some(f => f.status === "processing");
      const allParsed = hasFiles && fileList.every(f => f.status === "parsed");
      const anyError = fileList.some(f => f.status === "error");

      const handleFiles = (inputFiles) => {
        if (!inputFiles || inputFiles.length === 0) return;
        Array.from(inputFiles).forEach(f => onUpload(type, f));
      };
      const handleDrop = (e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); };

      const statusColor = !hasFiles ? C.gray400 : allParsed ? C.green : anyProcessing ? C.blue : anyError ? C.red : C.navy;
      const statusLabel = !hasFiles ? "Not uploaded" : allParsed ? "Parsed" : anyProcessing ? "Processing..." : anyError ? "Error" : `${fileList.length} file${fileList.length > 1 ? "s" : ""}`;

      return (
        <div style={{ border: `2px ${dragOver ? "solid" : "dashed"} ${dragOver ? C.red : hasFiles ? C.gray200 : C.gray300}`, borderRadius: 12, background: dragOver ? C.redBg + "30" : C.white, transition: "all 0.2s", overflow: "hidden" }}
