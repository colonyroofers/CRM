                    ...ticketPriorityData.map(d => [d.label, d.value])
                  ];
                  downloadCSV(`Colony_Roofers_Report_${new Date().toISOString().split("T")[0]}.csv`, allSections[0], allSections.slice(1));
                }
              }} style={{ padding: "7px 14px", border: `1px solid ${C.gray300}`, background: C.white, color: C.navy, fontSize: 12, fontWeight: 600, borderRadius: 6, cursor: "pointer" }}>📥 Export CSV</button>
            </div>

            {/* Charts tab */}
            {reportTab === "charts" && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 20 }}>
                {/* Pipeline funnel */}
                <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: 20 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, color: C.navy, margin: "0 0 16px" }}>Pipeline by Stage</h3>
                  {pipelineData.length > 0 ? <BarChart data={pipelineData} width={400} height={220} /> : <p style={{ color: C.gray400, fontSize: 12 }}>No pipeline data available</p>}
                </div>

                {/* Market distribution */}
                <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: 20 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, color: C.navy, margin: "0 0 16px" }}>Leads by Market</h3>
                  {marketLeadData.some(d => d.value > 0) ? <BarChart data={marketLeadData} width={400} height={220} /> : <p style={{ color: C.gray400, fontSize: 12 }}>No market data available</p>}
                </div>

                {/* Win rate donut charts by market */}
                {["ATL", "TPA", "DFW"].map(market => {
                  const awarded = leads.filter(l => {
                    const comp = companies.find(c => c.id === l.companyId);
                    return comp?.market === market && l.stage === "awarded";
                  }).length;
                  const lost = leads.filter(l => {
                    const comp = companies.find(c => c.id === l.companyId);
                    return comp?.market === market && l.stage === "closed_lost";
                  }).length;
                  const open = leads.filter(l => {
                    const comp = companies.find(c => c.id === l.companyId);
                    return comp?.market === market && !["awarded", "closed_lost"].includes(l.stage);
                  }).length;
                  const donutData = [
                    { value: awarded, color: C.green },
                    { value: lost, color: C.red },
                    { value: open, color: C.blue }
                  ].filter(d => d.value > 0);
                  return (
                    <div key={market} style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: 20, display: "flex", flexDirection: "column", alignItems: "center" }}>
                      <h3 style={{ fontSize: 14, fontWeight: 700, color: C.navy, margin: "0 0 16px" }}>{market} Win Rate</h3>
                      {donutData.length > 0 ? <DonutChart data={donutData} size={160} label={`${((awarded / (awarded + lost)) * 100 || 0).toFixed(0)}%`} /> : <p style={{ color: C.gray400, fontSize: 12 }}>No data</p>}
                      <div style={{ fontSize: 11, color: C.gray500, marginTop: 12, textAlign: "center" }}>Awarded: {awarded} · Lost: {lost}</div>
                    </div>
                  );
                })}

                {/* Service priority tickets */}
                <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: 20 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, color: C.navy, margin: "0 0 16px" }}>Tickets by Priority</h3>
                  {ticketPriorityData.length > 0 ? <BarChart data={ticketPriorityData} width={400} height={220} /> : <p style={{ color: C.gray400, fontSize: 12 }}>No ticket data available</p>}
                </div>

                {/* Loss Reasons */}
                {(() => {
                  const lossReasons = leads.filter(l => l.stage === "closed_lost").reduce((acc, l) => {
                    const reason = l.closeReason || "Unknown";
                    const existing = acc.find(r => r.label === reason);
                    if (existing) { existing.value++; } else { acc.push({ label: reason, value: 1, displayValue: 1, color: C.red }); }
                    return acc;
                  }, []).sort((a, b) => b.value - a.value);
                  return (
                    <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: 20 }}>
                      <h3 style={{ fontSize: 14, fontWeight: 700, color: C.navy, margin: "0 0 16px" }}>Loss Reasons</h3>
                      {lossReasons.length > 0 ? <BarChart data={lossReasons} width={400} height={220} /> : <p style={{ color: C.gray400, fontSize: 12 }}>No lost deals yet</p>}
                    </div>
                  );
                })()}

                {/* Top Competitors */}
                {(() => {
                  const competitors = leads.filter(l => l.stage === "closed_lost" && l.lostToCompetitor).reduce((acc, l) => {
                    const comp = l.lostToCompetitor;
                    const existing = acc.find(c => c.name === comp);
                    const amount = l.estimatedValue || 0;
                    if (existing) { existing.count++; existing.amount += amount; } else { acc.push({ name: comp, count: 1, amount }); }
                    return acc;
                  }, []).sort((a, b) => b.count - a.count).slice(0, 10);
                  return (
                    <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: 20 }}>
                      <h3 style={{ fontSize: 14, fontWeight: 700, color: C.navy, margin: "0 0 16px" }}>Top Competitors</h3>
                      {competitors.length > 0 ? (
                        <div style={{ display: "grid", gap: 8 }}>
                          {competitors.map((c, i) => (
                            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "10px 12px", background: C.gray50, borderRadius: 6 }}>
                              <div><div style={{ fontSize: 13, fontWeight: 600, color: C.navy }}>{c.name}</div><div style={{ fontSize: 11, color: C.gray500 }}>Won {c.count} deal{c.count !== 1 ? "s" : ""}</div></div>
                              <div style={{ textAlign: "right" }}><div style={{ fontSize: 13, fontWeight: 700, color: C.red }}>{formatCurrency(c.amount)}</div><div style={{ fontSize: 11, color: C.gray500 }}>Total lost</div></div>
                            </div>
                          ))}
                        </div>
                      ) : <p style={{ color: C.gray400, fontSize: 12 }}>No competitor data available</p>}
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Table tab */}
            {reportTab === "table" && (
              <>
                {/* Report type + search */}
                <div style={{ display: "flex", gap: 12, marginBottom: 20, alignItems: "center" }}>
                  <div style={{ display: "flex", gap: 2, background: C.white, border: `1px solid ${C.gray200}`, borderRadius: 8, padding: 2 }}>
                    {[{ id: "company", label: "By Company" }, { id: "property", label: "By Property" }, { id: "contact", label: "By Contact" }].map(t => <button key={t.id} onClick={() => setReportType(t.id)} style={{ padding: "7px 16px", borderRadius: 6, border: "none", fontSize: 12, fontWeight: 600, background: reportType === t.id ? C.navy : "transparent", color: reportType === t.id ? C.white : C.gray500, cursor: "pointer" }}>{t.label}</button>)}
                  </div>
                  <div style={{ position: "relative", flex: 1 }}><span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: C.gray400 }}>{I.search}</span>
                    <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ width: "100%", padding: "8px 10px 8px 34px", border: `1px solid ${C.gray300}`, borderRadius: 8, fontSize: 13, color: C.navy, outline: "none", background: C.white }} /></div>
                </div>
                {/* Report table */}
            <div style={{ borderRadius: 10, border: `1px solid ${C.gray200}`, overflow: "hidden", background: C.white }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead><tr style={{ background: C.gray50 }}>
                  <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase" }}>{reportType}</th>
                  <th style={{ padding: "10px 8px", textAlign: "center", fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase" }}>Leads</th>
                  <th style={{ padding: "10px 8px", textAlign: "right", fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase" }}>Pipeline</th>
                  <th style={{ padding: "10px 8px", textAlign: "right", fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase" }}>Won</th>
                  <th style={{ padding: "10px 8px", textAlign: "center", fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase" }}>Tickets</th>
                  <th style={{ padding: "10px 8px", textAlign: "center", fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase" }}>Open</th>
                  {reportType === "company" && <th style={{ padding: "10px 8px", textAlign: "center", fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase" }}>Properties</th>}
                </tr></thead>
                <tbody>{rows.map(r => {
                  const pipeline = r.leads.filter(l => !["awarded", "closed_lost"].includes(l.stage)).reduce((s, l) => s + (l.estimatedValue || 0), 0);
                  const won = r.leads.filter(l => l.stage === "awarded").reduce((s, l) => s + (l.estimatedValue || 0), 0);
                  const openTix = r.tickets.filter(t => !["Complete", "Closed"].includes(t.status)).length;
                  return (
                    <tr key={r.id} style={{ borderTop: `1px solid ${C.gray100}` }}>
                      <td style={{ padding: "10px 12px" }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><span>{r.icon}</span><div><div style={{ fontWeight: 700, color: C.navy }}>{r.name}</div><div style={{ fontSize: 10, color: C.gray400 }}>{r.sub}</div></div></div></td>
                      <td style={{ padding: "10px 8px", textAlign: "center", fontWeight: 600, color: C.navy }}>{r.leads.length}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", fontWeight: 700, color: C.navy }}>{pipeline > 0 ? formatCurrency(pipeline) : "—"}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", fontWeight: 700, color: won > 0 ? C.green : C.gray400 }}>{won > 0 ? formatCurrency(won) : "—"}</td>
                      <td style={{ padding: "10px 8px", textAlign: "center", fontWeight: 600, color: C.navy }}>{r.tickets.length}</td>
                      <td style={{ padding: "10px 8px", textAlign: "center" }}>{openTix > 0 ? <span style={{ padding: "2px 8px", borderRadius: 8, background: C.yellowBg, color: C.yellow, fontSize: 10, fontWeight: 700 }}>{openTix}</span> : <span style={{ color: C.gray400 }}>0</span>}</td>
                      {reportType === "company" && <td style={{ padding: "10px 8px", textAlign: "center", color: C.gray600 }}>{r.properties}</td>}
                    </tr>
                  );
                })}</tbody>
              </table>
              {rows.length === 0 && <div style={{ padding: 40, textAlign: "center", color: C.gray400, fontSize: 12 }}>No data yet. Add companies, leads, and tickets to see reports here.</div>}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // AI AGENT (Platform-wide — can read AND write CRM data)
    // ============================================================
    function AIAgent({ user, role, entities, salesLeads, serviceTickets, setSalesLeads, setServiceTickets, currentModule }) {
      const { companies, properties, contacts, setCompanies, setProperties, setContacts } = entities;
      const [open, setOpen] = useState(false);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [processing, setProcessing] = useState(false);
      const chatEndRef = useRef(null);
      const inputRef = useRef(null);
      const fileInputRef = useRef(null);
      const [attachedFile, setAttachedFile] = useState(null);

      useEffect(() => { if (open) { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); inputRef.current?.focus(); } }, [open, messages]);

      // ── Tool definitions for Claude ──────────────────────────
      const TOOLS = [
        { name: "create_company", description: "Create a new company in the CRM directory", input_schema: { type: "object", properties: { name: { type: "string" }, market: { type: "string", enum: ["ATL", "TPA", "DFW"] }, type: { type: "string" }, phone: { type: "string" }, address: { type: "string" }, notes: { type: "string" } }, required: ["name"] } },
        { name: "create_property", description: "Create a new property linked to a company", input_schema: { type: "object", properties: { name: { type: "string" }, companyId: { type: "string" }, address: { type: "string" }, market: { type: "string", enum: ["ATL", "TPA", "DFW"] }, sqft: { type: "number" }, roofType: { type: "string" }, buildingCount: { type: "number" } }, required: ["name"] } },
        { name: "create_contact", description: "Create a new contact linked to a company", input_schema: { type: "object", properties: { name: { type: "string" }, companyId: { type: "string" }, email: { type: "string" }, phone: { type: "string" }, title: { type: "string" } }, required: ["name"] } },
        { name: "create_lead", description: "Create a new sales lead/opportunity in the pipeline", input_schema: { type: "object", properties: { company: { type: "string", description: "Company name if not linking to existing" }, companyId: { type: "string", description: "ID of existing company" }, propertyId: { type: "string" }, contactId: { type: "string" }, contactName: { type: "string" }, contactEmail: { type: "string" }, market: { type: "string", enum: ["ATL", "TPA", "DFW"] }, source: { type: "string" }, estimatedValue: { type: "number" }, notes: { type: "string" } }, required: [] } },
        { name: "update_lead", description: "Update an existing sales lead — change stage, value, notes, next action, estimator, etc.", input_schema: { type: "object", properties: { leadId: { type: "string" }, stage: { type: "string", enum: ["new_lead", "contacted", "meeting_set", "proposal_sent", "being_estimated", "negotiation", "awarded", "closed_lost"] }, estimatedValue: { type: "number" }, nextAction: { type: "string" }, estimator: { type: "string", description: "Assign an estimator by name" }, notes: { type: "string" } }, required: ["leadId"] } },
        { name: "create_ticket", description: "Create a new service ticket", input_schema: { type: "object", properties: { subject: { type: "string" }, type: { type: "string", enum: ["Leak / Repair", "Warranty Claim", "Scheduled Maintenance", "Inspection Follow-Up", "Emergency", "Other"] }, priority: { type: "string", enum: ["Emergency", "High", "Medium", "Low"] }, market: { type: "string", enum: ["ATL", "TPA", "DFW"] }, companyId: { type: "string" }, propertyId: { type: "string" }, contactId: { type: "string" }, description: { type: "string" }, assignedTo: { type: "string" } }, required: ["subject"] } },
        { name: "update_ticket", description: "Update a service ticket — change status, priority, assignment, add notes", input_schema: { type: "object", properties: { ticketId: { type: "string" }, status: { type: "string", enum: ["New", "Dispatched", "In Progress", "On Hold", "Complete", "Closed"] }, priority: { type: "string", enum: ["Emergency", "High", "Medium", "Low"] }, assignedTo: { type: "string" }, notes: { type: "string" } }, required: ["ticketId"] } },
        { name: "search_crm", description: "Search across all CRM data — companies, properties, contacts, leads, tickets. Use this to find IDs before creating or updating records.", input_schema: { type: "object", properties: { query: { type: "string", description: "Search term" }, type: { type: "string", enum: ["all", "companies", "properties", "contacts", "leads", "tickets"] } }, required: ["query"] } },
        { name: "draft_email", description: "Send an email to a contact — logged to the CRM activity feed", input_schema: { type: "object", properties: { to: { type: "string" }, subject: { type: "string" }, body: { type: "string" } }, required: ["to", "subject", "body"] } },
        { name: "get_crm_report", description: "Generate a CRM status report — pipeline summary, open tickets, recent activity. Use this when asked for updates, status reports, or summaries.", input_schema: { type: "object", properties: { type: { type: "string", enum: ["pipeline", "tickets", "activity", "full"], description: "Report type" } }, required: ["type"] } },
        { name: "log_external_update", description: "Log an update from an external system (e.g., Claude Co-Work) into the CRM activity feed", input_schema: { type: "object", properties: { entityType: { type: "string", enum: ["lead", "ticket", "company", "general"] }, entityId: { type: "string" }, message: { type: "string" }, source: { type: "string", description: "Source system name, e.g., 'Claude Co-Work'" } }, required: ["message"] } },
        { name: "process_document", description: "Process an uploaded document (PDF, Excel, Word) to extract data for the catalog, vendor list, or other CRM data. Upload a pricing sheet to update product prices, a vendor list to create vendors, or other documents to extract structured data.", input_schema: { type: "object", properties: { action: { type: "string", enum: ["update_pricing", "import_vendors", "import_products", "extract_data"], description: "What to do with the document data" }, data: { type: "array", items: { type: "object" }, description: "Extracted data rows from the document" } }, required: ["action", "data"] } },
      ];

      // ── Tool execution ───────────────────────────────────────
      const executeTool = async (name, input) => {
        const id = generateId();
        const now = new Date().toISOString();
        try {
          if (name === "create_company") {
            const item = { ...input, id, createdAt: now };
            setCompanies(prev => [item, ...prev]);
            return { success: true, message: `Created company "${input.name}" (ID: ${id})`, id };
          }
          if (name === "create_property") {
            const item = { ...input, id, createdAt: now };
            setProperties(prev => [item, ...prev]);
            return { success: true, message: `Created property "${input.name}" (ID: ${id})`, id };
          }
          if (name === "create_contact") {
            const item = { ...input, id, createdAt: now };
            setContacts(prev => [item, ...prev]);
            return { success: true, message: `Created contact "${input.name}" (ID: ${id})`, id };
          }
          if (name === "create_lead") {
            const lead = { ...input, id, stage: "new_lead", createdAt: now, activities: [{ type: "created", text: "Created by AI Agent", by: user.name, at: now }] };
            setSalesLeads(prev => [lead, ...prev]);
            return { success: true, message: `Created lead for "${input.company || input.companyId}" (ID: ${id})`, id };
          }
          if (name === "update_lead") {
            const { leadId, notes, ...updates } = input;
            const lead = salesLeads.find(l => l.id === leadId);
            if (!lead) return { success: false, message: `Lead ${leadId} not found` };
            const activity = { type: "ai_update", text: `AI Agent: ${Object.entries(updates).map(([k, v]) => `${k}→${v}`).join(", ")}${notes ? `. Note: ${notes}` : ""}`, by: user.name, at: now };
            setSalesLeads(prev => prev.map(l => l.id === leadId ? { ...l, ...updates, activities: [...(l.activities || []), activity] } : l));
            return { success: true, message: `Updated lead ${leadId}` };
          }
          if (name === "create_ticket") {
            const ticket = { ...input, id, status: "New", createdAt: now, createdBy: user.name + " (via AI)", activities: [{ type: "created", text: "Created by AI Agent", by: user.name, at: now }] };
            setServiceTickets(prev => [ticket, ...prev]);
            return { success: true, message: `Created ticket "${input.subject}" (ID: ${id})`, id };
          }
          if (name === "update_ticket") {
            const { ticketId, notes, ...updates } = input;
            const ticket = serviceTickets.find(t => t.id === ticketId);
            if (!ticket) return { success: false, message: `Ticket ${ticketId} not found` };
            const activity = { type: "ai_update", text: `AI Agent: ${Object.entries(updates).map(([k, v]) => `${k}→${v}`).join(", ")}${notes ? `. Note: ${notes}` : ""}`, by: user.name, at: now };
            setServiceTickets(prev => prev.map(t => t.id === ticketId ? { ...t, ...updates, activities: [...(t.activities || []), activity] } : t));
            return { success: true, message: `Updated ticket ${ticketId}` };
          }
          if (name === "search_crm") {
            const q = (input.query || "").toLowerCase();
            const t = input.type || "all";
            const results = {};
            if (t === "all" || t === "companies") results.companies = companies.filter(c => c.name?.toLowerCase().includes(q)).slice(0, 10).map(c => ({ id: c.id, name: c.name, market: c.market, type: c.type }));
            if (t === "all" || t === "properties") results.properties = properties.filter(p => (p.name?.toLowerCase().includes(q) || p.address?.toLowerCase().includes(q))).slice(0, 10).map(p => ({ id: p.id, name: p.name, address: p.address, companyId: p.companyId, companyName: companies.find(c => c.id === p.companyId)?.name }));
            if (t === "all" || t === "contacts") results.contacts = contacts.filter(c => (c.name?.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q))).slice(0, 10).map(c => ({ id: c.id, name: c.name, email: c.email, phone: c.phone, companyId: c.companyId, companyName: companies.find(co => co.id === c.companyId)?.name }));
            if (t === "all" || t === "leads") results.leads = salesLeads.filter(l => ((l.company || "").toLowerCase().includes(q) || companies.find(c => c.id === l.companyId)?.name?.toLowerCase().includes(q))).slice(0, 10).map(l => ({ id: l.id, company: companies.find(c => c.id === l.companyId)?.name || l.company, stage: l.stage, estimatedValue: l.estimatedValue, market: l.market }));
            if (t === "all" || t === "tickets") results.tickets = serviceTickets.filter(t => (t.subject?.toLowerCase().includes(q) || companies.find(c => c.id === t.companyId)?.name?.toLowerCase().includes(q))).slice(0, 10).map(t => ({ id: t.id, subject: t.subject, status: t.status, priority: t.priority, company: companies.find(c => c.id === t.companyId)?.name }));
            return { success: true, results };
          }
          if (name === "draft_email") {
            // Log email to Firestore instead of opening Gmail
            if (firestoreDb) {
              try {
                const emailRecord = { id: generateId(), to: input.to, subject: input.subject, body: input.body, sentAt: now, sentBy: user.name + " (via AI)", direction: "outbound" };
                firestoreDb.collection("cr_email_log").add(emailRecord);
              } catch (e) { console.error("Email log error:", e); }
            }
            return { success: true, message: `Email sent to ${input.to} — "${input.subject}"` };
          }
          if (name === "get_crm_report") {
            const leads = salesLeads || [];
            const tickets = serviceTickets || [];
            const openLeads = leads.filter(l => !["awarded", "closed_lost"].includes(l.stage));
            const wonLeads = leads.filter(l => l.stage === "awarded");
            const openTickets = tickets.filter(t => !["Complete", "Closed"].includes(t.status));
            const pipeline = openLeads.reduce((s, l) => s + (l.estimatedValue || 0), 0);
            const wonTotal = wonLeads.reduce((s, l) => s + (l.estimatedValue || 0), 0);

            if (input.type === "pipeline" || input.type === "full") {
              const byStage = {};
              openLeads.forEach(l => { byStage[l.stage] = (byStage[l.stage] || { count: 0, value: 0 }); byStage[l.stage].count++; byStage[l.stage].value += (l.estimatedValue || 0); });
              var pipelineReport = { totalOpen: openLeads.length, totalWon: wonLeads.length, pipelineValue: pipeline, wonValue: wonTotal, byStage, recentLeads: leads.slice(0, 10).map(l => ({ id: l.id, company: companies.find(c => c.id === l.companyId)?.name || l.company, stage: l.stage, value: l.estimatedValue, market: l.market })) };
            }
            if (input.type === "tickets" || input.type === "full") {
              var ticketReport = { totalOpen: openTickets.length, byPriority: { Emergency: openTickets.filter(t => t.priority === "Emergency").length, High: openTickets.filter(t => t.priority === "High").length, Medium: openTickets.filter(t => t.priority === "Medium").length, Low: openTickets.filter(t => t.priority === "Low").length }, recent: tickets.slice(0, 10).map(t => ({ id: t.id, subject: t.subject, status: t.status, priority: t.priority, company: companies.find(c => c.id === t.companyId)?.name })) };
            }
            if (input.type === "activity" || input.type === "full") {
              const allActivities = [...leads.flatMap(l => (l.activities || []).map(a => ({ ...a, source: "lead", entityName: companies.find(c => c.id === l.companyId)?.name || l.company }))), ...tickets.flatMap(t => (t.activities || []).map(a => ({ ...a, source: "ticket", entityName: t.subject })))].sort((a, b) => new Date(b.at) - new Date(a.at)).slice(0, 20);
              var activityReport = { recentActivities: allActivities };
            }
            return { success: true, report: { pipeline: pipelineReport, tickets: ticketReport, activity: activityReport, generatedAt: now, companies: companies.length, contacts: contacts.length, properties: properties.length } };
          }

            if (firestoreDb) {

    function CustomerPortal({ token }) {
      const [project, setProject] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState("summary");

      useEffect(() => {
        const loadProject = async () => {
          if (!firestoreDb || !token) return;
          try {
            const snap = await firestoreDb.collection("cr_portal_projects").where("portalToken", "==", token).get();
            if (snap.docs.length > 0) {
              setProject(snap.docs[0].data());
            }
            setLoading(false);
          } catch (err) {
            console.error("Portal load error:", err);
            setLoading(false);
          }
        };
        loadProject();
      }, [token]);

                    </div>
                  </div>
                  {/* Distribution Supply Integrations */}
                  <div style={{ padding: "20px 24px", borderRadius: 12, border: `2px solid #F59E0B20`, background: C.white, marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 40, height: 40, borderRadius: 10, background: "#059669", display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 16, fontWeight: 800 }}>📦</div>
                        <div><div style={{ fontSize: 15, fontWeight: 700, color: C.navy }}>Distribution Supply APIs</div><div style={{ fontSize: 11, color: C.gray500 }}>SRS Distribution · ABC Supply · QXO</div></div>
                      </div>
                      <span style={{ padding: "4px 12px", borderRadius: 6, fontSize: 11, fontWeight: 700, background: "#FEF3C7", color: "#D97706" }}>Coming Soon</span>
                    </div>
                    <div style={{ fontSize: 12, color: C.gray600, lineHeight: 1.6, marginBottom: 12 }}>Auto-sync product pricing, availability, and ordering directly from your distribution partners into the product catalog.</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                      {[{ name: "SRS Distribution", code: "SRS" }, { name: "ABC Supply", code: "ABC" }, { name: "QXO", code: "QXO" }].map(d => (
                        <div key={d.code} style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50, textAlign: "center" }}>
                          <div style={{ fontSize: 14, fontWeight: 800, color: C.navy }}>{d.code}</div>
                          <div style={{ fontSize: 10, color: C.gray500, marginTop: 2 }}>{d.name}</div>
                          <div style={{ fontSize: 9, color: "#D97706", fontWeight: 600, marginTop: 4 }}>Pending API Access</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Sage Intacct */}
                  <div style={{ padding: "20px 24px", borderRadius: 12, border: `2px solid #6366F120`, background: C.white, marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 40, height: 40, borderRadius: 10, background: "#6366F1", display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 16, fontWeight: 800 }}>SI</div>
                        <div><div style={{ fontSize: 15, fontWeight: 700, color: C.navy }}>Sage Intacct</div><div style={{ fontSize: 11, color: C.gray500 }}>Accounting & financial management</div></div>
                      </div>
                      <span style={{ padding: "4px 12px", borderRadius: 6, fontSize: 11, fontWeight: 700, background: "#FEF3C7", color: "#D97706" }}>Coming Soon</span>
                    </div>
                    <div style={{ fontSize: 12, color: C.gray600, lineHeight: 1.6, marginBottom: 12 }}>Bi-directional sync with Sage Intacct for invoicing, GL entries, AP/AR, and financial reporting.</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                      <div style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase", marginBottom: 4 }}>CRM → Sage</div>
                        <div style={{ fontSize: 11, color: C.gray600 }}>Invoices, Schedule of Values, Customer Records, Project Budgets</div>
                      </div>
                      <div style={{ padding: "10px 12px", borderRadius: 8, background: C.gray50 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase", marginBottom: 4 }}>Sage → CRM</div>
                        <div style={{ fontSize: 11, color: C.gray600 }}>Payment Status, GL Balances, AR Aging, Financial Reports</div>
                      </div>
                    </div>
                  </div>

                  {/* Claude Co-Work */}
                  <div style={{ padding: "20px 24px", borderRadius: 12, border: `2px solid ${C.green}30`, background: C.white, marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 40, height: 40, borderRadius: 10, background: "#D97706", display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 16 }}>🤖</div>
                        <div><div style={{ fontSize: 15, fontWeight: 700, color: C.navy }}>Claude Co-Work</div><div style={{ fontSize: 11, color: C.gray500 }}>AI assistant for reports, updates & automation</div></div>
                      </div>
                      <span style={{ padding: "4px 12px", borderRadius: 6, fontSize: 11, fontWeight: 700, background: C.greenBg, color: C.green }}>Active</span>
                    </div>
                    <div style={{ fontSize: 12, color: C.gray600 }}>Connected via Firestore API. Claude can read/write CRM data, generate reports, and perform automated tasks.</div>
                  </div>
                </div>
              )}
              {!settingsView && currentModule === "daily_digest" && <DailyDigestModule user={user} role={role} entities={sharedEntities} salesLeads={salesLeads} serviceTickets={serviceTickets} inspections={inspectionsData} crmUsers={crmUsers} />}
              {!settingsView && currentModule === "estimating" && <EstimatingModule user={user} role={role} entities={sharedEntities} salesLeads={salesLeads} setSalesLeads={setSalesLeads} crmUsers={crmUsers} />}
              {!settingsView && currentModule === "production" && <ProductionModule user={user} role={role} />}
              {!settingsView && currentModule === "sales" && <SalesModule user={user} role={role} entities={sharedEntities} crmUsers={crmUsers} onMention={addMention} inspections={inspectionsData} setInspections={setInspections} />}
              {!settingsView && currentModule === "dispatch" && <DispatchModule user={user} role={role} entities={sharedEntities} inspections={inspectionsData} setInspections={setInspections} salesLeads={salesLeads} serviceTickets={serviceTickets} setSalesLeads={setSalesLeads} crmUsers={crmUsers} />}
              {!settingsView && currentModule === "inspections" && <InspectionsModule user={user} role={role} inspections={inspectionsData} setInspections={setInspections} entities={sharedEntities} crmUsers={crmUsers} salesLeads={salesLeads} serviceTickets={serviceTickets} />}
              {!settingsView && currentModule === "service" && <ServiceModule user={user} role={role} entities={sharedEntities} crmUsers={crmUsers} onMention={addMention} inspections={inspectionsData} setInspections={setInspections} />}
              {!settingsView && currentModule === "directory" && <DirectoryModule user={user} role={role} entities={sharedEntities} salesLeads={salesLeads} serviceTickets={serviceTickets} setSalesLeads={setSalesLeads} setServiceTickets={setServiceTickets} crmUsers={crmUsers} />}
              {!settingsView && currentModule === "finance" && <FinanceModule user={user} role={role} />}
              {!settingsView && currentModule === "reports" && <ReportsModule user={user} role={role} entities={sharedEntities} salesLeads={salesLeads} serviceTickets={serviceTickets} />}
              {!settingsView && currentModule === "calendar" && <CalendarModule user={user} role={role} entities={sharedEntities} salesLeads={salesLeads} serviceTickets={serviceTickets} inspections={inspectionsData} />}
              {!settingsView && currentModule === "catalog" && <ProductCatalogModule user={user} role={role} crmUsers={crmUsers} />}
            </div>

            <AIAgent user={user} role={role} entities={sharedEntities} salesLeads={salesLeads} serviceTickets={serviceTickets} setSalesLeads={setSalesLeads} setServiceTickets={setServiceTickets} currentModule={currentModule} />
          </div>

          {/* Floating Email Button */}
          <button onClick={() => setShowFloatingEmail(true)} style={{ position: "fixed", bottom: 24, right: 24, width: 56, height: 56, borderRadius: "50%", border: "none", background: `linear-gradient(135deg, ${C.red}, ${C.redDark})`, color: C.white, fontSize: 24, cursor: "pointer", boxShadow: "0 6px 20px rgba(0,0,0,0.25)", zIndex: 900, display: "flex", alignItems: "center", justifyContent: "center", transition: "transform 0.15s" }} onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"} onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"} title="Compose Email">✉️</button>

          {/* Floating Email Compose Modal */}
          {showFloatingEmail && <div style={{ position: "fixed", inset: 0, zIndex: 2500, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(17,29,53,0.6)", backdropFilter: "blur(4px)" }} onClick={() => { setShowFloatingEmail(false); setFloatingEmailCtx(null); }}>
            <div style={{ width: 520 }} onClick={e => e.stopPropagation()}>
              <EmailCompose
                to={floatingEmailCtx?.contactEmail || ""}
                defaultSubject={floatingEmailCtx?.subject || ""}
                defaultBody={`\n\nZach Reece, Owner\nColony Roofers\n404-806-0956`}
                contacts={contactsData}
                defaultContactId={floatingEmailCtx?.contactId || ""}
                onCancel={() => { setShowFloatingEmail(false); setFloatingEmailCtx(null); }}
                onSent={() => { setShowFloatingEmail(false); setFloatingEmailCtx(null); }}
              />
            </div>
          </div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
