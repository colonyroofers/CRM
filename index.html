                  } catch (err) { console.error("Upload failed:", err); alert("Failed to upload document"); }
                };
                const handleDelete = (docId) => { if (confirm("Delete this document?")) { onUpdate(lead.id, { documents: (lead.documents || []).filter(d => d.id !== docId) }); } };
                return (
                  <div style={{ display: "grid", gap: 16 }}>
                    <div style={{ padding: "16px", borderRadius: 10, border: `1px solid ${C.gray200}`, background: C.gray50 }}>
                      <h4 style={{ fontSize: 12, fontWeight: 700, color: C.navy, margin: "0 0 12px" }}>Upload Document</h4>
                      <div style={{ display: "grid", gap: 10 }}>
                        <select value={selectedCategory} onChange={e => setSelectedCategory(e.target.value)} style={{ padding: "8px 12px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 13, color: C.navy, outline: "none", background: C.white, cursor: "pointer" }}>
                          <option value="Proposal">Proposal</option>
                          <option value="Photos">Photos</option>
                          <option value="Survey Report">Survey Report</option>
                          <option value="Contract">Contract</option>
                          <option value="Insurance">Insurance</option>
                          <option value="Permit">Permit</option>
                          <option value="Lien Waiver">Lien Waiver</option>
                          <option value="Other">Other</option>
                        </select>
                        <div>
                          <input ref={fileInputRef} type="file" onChange={handleFileUpload} style={{ display: "none" }} />
                          <button onClick={() => fileInputRef.current?.click()} style={{ width: "100%", padding: "10px 14px", border: `1px solid ${C.gray300}`, background: C.white, color: C.navy, fontSize: 12, fontWeight: 600, borderRadius: 6, cursor: "pointer" }}>Choose File</button>
                        </div>
                      </div>
                    </div>
                    {(lead.documents || []).length > 0 ? (
                      <div style={{ display: "grid", gap: 10 }}>
                        {(lead.documents || []).map(doc => (
                          <div key={doc.id} style={{ padding: "12px 14px", borderRadius: 8, border: `1px solid ${C.gray200}`, background: C.white, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div style={{ display: "flex", gap: 10, alignItems: "center", flex: 1, minWidth: 0 }}>
                              <span style={{ fontSize: 16 }}>{doc.type?.includes("image") ? "🖼️" : doc.type?.includes("pdf") ? "📄" : "📎"}</span>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <button onClick={() => window.open(doc.url, "_blank")} style={{ background: "none", border: "none", color: C.red, fontSize: 12, fontWeight: 600, cursor: "pointer", textAlign: "left", textDecoration: "underline" }}>{doc.name}</button>
                                <div style={{ fontSize: 11, color: C.gray500, marginTop: 2 }}><span style={{ padding: "2px 6px", background: C.gray100, borderRadius: 4, fontSize: 10, fontWeight: 600, marginRight: 6 }}>{doc.category}</span>{new Date(doc.uploadedAt).toLocaleDateString()}</div>
                              </div>
                            </div>
                            <button onClick={() => handleDelete(doc.id)} style={{ padding: "4px 8px", borderRadius: 4, border: "none", background: C.redBg, color: C.red, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Delete</button>
                          </div>
                        ))}
                      </div>
                    ) : <p style={{ color: C.gray400, fontSize: 12, textAlign: "center", padding: "20px" }}>No documents yet. Upload files to track proposals, contracts, and other project materials.</p>}
                  </div>
                );
              })()}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // MODULE: DIRECTORY (Companies, Properties, Contacts)
    // ============================================================
    const COMPANY_TYPES = ["Property Manager", "HOA / Condo", "Owner / Investor", "General Contractor", "Government", "Non-Profit", "Other"];

    function DirectoryModule({ user, role, entities, salesLeads, serviceTickets, setSalesLeads, setServiceTickets, crmUsers }) {
      const { companies, properties, contacts, subcontractors, setCompanies, setProperties, setContacts, setSubcontractors } = entities;
      const [tab, setTab] = useState("companies");
      const [search, setSearch] = useState("");
      const [showCreate, setShowCreate] = useState(null);
      const [selected, setSelected] = useState(null);
      const [showCreateLead, setShowCreateLead] = useState(null); // { companyId, propertyId, contactId }
      const [showCreateTicket, setShowCreateTicket] = useState(null); // { companyId, propertyId, contactId }
      const [viewingLead, setViewingLead] = useState(null);
      const [viewingTicket, setViewingTicket] = useState(null);

      const s = search.toLowerCase();
      const filteredCo = companies.filter(c => !s || c.name?.toLowerCase().includes(s));
      const filteredPr = properties.filter(p => !s || p.name?.toLowerCase().includes(s) || p.address?.toLowerCase().includes(s));
      const filteredCt = contacts.filter(c => !s || c.name?.toLowerCase().includes(s) || c.email?.toLowerCase().includes(s));
      const filteredSb = (subcontractors || []).filter(sb => !s || sb.companyName?.toLowerCase().includes(s) || sb.contactName?.toLowerCase().includes(s) || sb.phone?.toLowerCase().includes(s));
      const leadsFor = (type, id) => (salesLeads || []).filter(l => l[type + "Id"] === id);
      const ticketsFor = (type, id) => (serviceTickets || []).filter(t => t[type + "Id"] === id);

      const handleCreate = (type, data) => {
        const item = { ...data, id: generateId(), createdAt: new Date().toISOString() };
        if (type === "company") setCompanies(prev => [item, ...prev]);
        if (type === "property") setProperties(prev => [item, ...prev]);
        if (type === "contact") setContacts(prev => [item, ...prev]);
        if (type === "subcontractor") setSubcontractors(prev => [item, ...prev]);
        setShowCreate(null);
      };
      const handleDelete = (type, id) => {
        if (!confirm(`Delete this ${type}?`)) return;
        if (type === "company") setCompanies(prev => prev.filter(c => c.id !== id));
        if (type === "property") setProperties(prev => prev.filter(p => p.id !== id));
        if (type === "contact") setContacts(prev => prev.filter(c => c.id !== id));
        if (type === "subcontractor") setSubcontractors(prev => prev.filter(s => s.id !== id));
        setSelected(null);
      };
      const handleCreateLead = (lead) => {
        const newLead = { ...lead, id: generateId(), stage: "new_lead", createdAt: new Date().toISOString(), activities: [{ type: "created", text: "Lead created from Directory", by: user.name, at: new Date().toISOString() }] };
        setSalesLeads(prev => [newLead, ...prev]);
        setShowCreateLead(null);
      };
      const handleCreateTicket = (ticket) => {
        const newTicket = { ...ticket, id: generateId(), status: "New", createdAt: new Date().toISOString(), createdBy: user.name, activities: [{ type: "created", text: "Ticket created from Directory", by: user.name, at: new Date().toISOString() }] };
        setServiceTickets(prev => [newTicket, ...prev]);
        setShowCreateTicket(null);
      };

      const getInsuranceStatus = (sub) => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const sixtyDaysAhead = new Date(today);
        sixtyDaysAhead.setDate(sixtyDaysAhead.getDate() + 60);

        const insExpiry = sub.insuranceExp ? new Date(sub.insuranceExp + "T23:59:59") : null;
        const wcExpiry = sub.wcExp ? new Date(sub.wcExp + "T23:59:59") : null;

        if (!insExpiry || !wcExpiry) return { label: "Incomplete", color: C.gray400 };
        if (insExpiry < today || wcExpiry < today) return { label: "Expired", color: C.red };
        if (insExpiry <= sixtyDaysAhead || wcExpiry <= sixtyDaysAhead) return { label: "Expiring Soon", color: C.yellow };
        return { label: "Current", color: C.green };
      };

      const EntityRow = ({ icon, name, sub, leadCount, ticketCount, onClick }) => (
        <div onClick={onClick} style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, cursor: "pointer", borderBottom: `1px solid ${C.gray100}` }}
          onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <div style={{ width: 36, height: 36, borderRadius: 8, background: `linear-gradient(135deg, ${C.navy}, ${C.navyLight})`, display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 16, flexShrink: 0 }}>{icon}</div>
          <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 13, color: C.navy }}>{name}</div><div style={{ fontSize: 11, color: C.gray500 }}>{sub}</div></div>
          <div style={{ display: "flex", gap: 6 }}>
            {leadCount > 0 && <span style={{ padding: "2px 7px", borderRadius: 6, background: C.blueBg, color: C.blue, fontSize: 10, fontWeight: 700 }}>{leadCount} lead{leadCount > 1 ? "s" : ""}</span>}
            {ticketCount > 0 && <span style={{ padding: "2px 7px", borderRadius: 6, background: C.yellowBg, color: C.yellow, fontSize: 10, fontWeight: 700 }}>{ticketCount} ticket{ticketCount > 1 ? "s" : ""}</span>}
          </div>
        </div>
      );

      const SubcontractorRow = ({ sub, onClick }) => {
        const insStatus = getInsuranceStatus(sub);
        const ratingStars = sub.rating ? "★".repeat(sub.rating) + "☆".repeat(5 - sub.rating) : "—";
        return (
          <div onClick={onClick} style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, cursor: "pointer", borderBottom: `1px solid ${C.gray100}` }}
            onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            <div style={{ width: 36, height: 36, borderRadius: 8, background: `linear-gradient(135deg, ${C.red}, ${C.redDark})`, display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 16, flexShrink: 0 }}>🔧</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: C.navy }}>{sub.companyName}</div>
              <div style={{ fontSize: 11, color: C.gray500 }}>{sub.contactName} · {sub.phone}</div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 10, fontWeight: 600, color: C.gray500, minWidth: 80 }}>{MARKET_LABELS[sub.market] || "—"}</span>
              {(sub.trades || []).length > 0 && <span style={{ fontSize: 9, color: C.gray400 }}>{sub.trades.length} trade{sub.trades.length > 1 ? "s" : ""}</span>}
              <span style={{ padding: "2px 7px", borderRadius: 4, fontSize: 9, fontWeight: 600, background: insStatus.color + "20", color: insStatus.color }}>{insStatus.label}</span>
              {sub.rating > 0 && <span style={{ fontSize: 11, color: C.yellow, minWidth: 55, textAlign: "right" }}>{ratingStars}</span>}
            </div>
          </div>
        );
      };

      // --- Entity Detail Slide-out ---
      const EntityDetail = () => {
        if (!selected) return null;
        const { type, id } = selected;
        const entity = type === "company" ? companies.find(c => c.id === id) : type === "property" ? properties.find(p => p.id === id) : type === "contact" ? contacts.find(c => c.id === id) : type === "subcontractor" ? (subcontractors || []).find(s => s.id === id) : null;
        if (!entity) return null;
        const leads = leadsFor(type, id);
        const tix = ticketsFor(type, id);
        const relProps = type === "company" ? properties.filter(p => p.companyId === id) : [];
        const relContacts = type === "company" ? contacts.filter(c => c.companyId === id) : [];
        const parentCo = (type !== "company" && entity.companyId) ? companies.find(c => c.id === entity.companyId) : null;
        const insStatus = type === "subcontractor" ? getInsuranceStatus(entity) : null;

        return (
          <div style={{ position: "fixed", inset: 0, zIndex: 2000, background: C.gray50, display: "flex", flexDirection: "column" }} onClick={() => setSelected(null)}>
            <div style={{ width: "100%", background: C.white, flex: 1, overflow: "auto" }} onClick={e => e.stopPropagation()}>
              <div style={{ padding: "20px 24px", background: `linear-gradient(135deg, ${C.navyDark}, ${C.navy})`, color: C.white }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                  <button onClick={() => setSelected(null)} style={{ background: "rgba(255,255,255,0.1)", border: "none", cursor: "pointer", color: C.white, padding: "4px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600 }}>← Close</button>
                  <div style={{ display: "flex", gap: 6 }}>
                    <span style={{ fontSize: 10, fontWeight: 600, opacity: 0.6, textTransform: "uppercase" }}>{type}</span>
                    <button onClick={() => handleDelete(type, id)} style={{ background: "rgba(239,68,68,0.3)", border: "none", cursor: "pointer", color: "#FCA5A5", padding: "4px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600 }}>Delete</button>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 28 }}>{{ company: "🏢", property: "🏠", contact: "👤", subcontractor: "🔧" }[type]}</span>
                  <div><h2 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>{type === "subcontractor" ? entity.companyName : entity.name}</h2>{type === "subcontractor" ? <p style={{ fontSize: 12, opacity: 0.7, margin: "2px 0 0" }}>{entity.contactName}</p> : parentCo && <p style={{ fontSize: 12, opacity: 0.7, margin: "2px 0 0" }}>{parentCo.name}</p>}</div>
                </div>
              </div>
              <div style={{ padding: "20px 24px" }}>
                {/* Details */}
                <div style={{ marginBottom: 24 }}><h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: "0 0 8px" }}>Details</h4>
                  {type === "subcontractor" ? (
                    <>
                      {entity.companyName && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Company</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.companyName}</span></div>}
                      {entity.contactName && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Contact</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.contactName}</span></div>}
                      {entity.phone && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Phone</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.phone}</span></div>}
                      {entity.email && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Email</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.email}</span></div>}
                      {entity.market && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Market</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{MARKET_LABELS[entity.market] || entity.market}</span></div>}
                      {entity.trades && entity.trades.length > 0 && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Trades</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.trades.join(", ")}</span></div>}
                      {entity.insuranceExp && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Insurance Exp</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.insuranceExp}</span></div>}
                      {entity.wcExp && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>W/C Exp</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.wcExp}</span></div>}
                      <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Insurance Status</span><span style={{ fontSize: 12, fontWeight: 600, color: insStatus.color }}>{insStatus.label}</span></div>}
                      {entity.w9OnFile !== undefined && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>W9 on File</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.w9OnFile ? "Yes" : "No"}</span></div>}
                      {entity.rating && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Rating</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{"★".repeat(entity.rating) + "☆".repeat(5 - entity.rating)}</span></div>}
                      {entity.notes && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500 }}>Notes</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{entity.notes}</span></div>}
                    </>
                  ) : (
                    Object.entries(entity).filter(([k]) => !["id", "createdAt", "companyId"].includes(k) && entity[k]).map(([k, v]) => <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.gray100}` }}><span style={{ fontSize: 12, color: C.gray500, textTransform: "capitalize" }}>{k.replace(/([A-Z])/g, " $1")}</span><span style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{String(v)}</span></div>)
                  )}
                </div>
                {/* Related Properties */}
                {type === "company" && <div style={{ marginBottom: 24 }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}><h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: 0 }}>Properties ({relProps.length})</h4><button onClick={() => { setSelected(null); setShowCreate("property"); }} style={{ padding: "3px 10px", borderRadius: 5, border: `1px solid ${C.gray300}`, background: C.white, color: C.navy, fontSize: 10, fontWeight: 600, cursor: "pointer" }}>+ Add Property</button></div>
                  {relProps.map(p => <div key={p.id} onClick={() => setSelected({ type: "property", id: p.id })} style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${C.gray200}`, marginBottom: 4, cursor: "pointer", display: "flex", justifyContent: "space-between" }} onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}><div><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>🏠 {p.name}</div><div style={{ fontSize: 10, color: C.gray400 }}>{p.address}</div></div><span style={{ fontSize: 10, color: C.gray400 }}>{ticketsFor("property", p.id).length} tickets</span></div>)}
                  {relProps.length === 0 && <p style={{ fontSize: 12, color: C.gray400, textAlign: "center", padding: 12, background: C.gray50, borderRadius: 8 }}>No properties yet</p>}
                </div>}
                {/* Related Contacts */}
                {type === "company" && <div style={{ marginBottom: 24 }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}><h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: 0 }}>Contacts ({relContacts.length})</h4><button onClick={() => { setSelected(null); setShowCreate("contact"); }} style={{ padding: "3px 10px", borderRadius: 5, border: `1px solid ${C.gray300}`, background: C.white, color: C.navy, fontSize: 10, fontWeight: 600, cursor: "pointer" }}>+ Add Contact</button></div>
                  {relContacts.map(c => <div key={c.id} onClick={() => setSelected({ type: "contact", id: c.id })} style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${C.gray200}`, marginBottom: 4, cursor: "pointer" }} onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>👤 {c.name}</div><div style={{ fontSize: 10, color: C.gray400 }}>{c.email} · {c.phone}</div></div>)}
                  {relContacts.length === 0 && <p style={{ fontSize: 12, color: C.gray400, textAlign: "center", padding: 12, background: C.gray50, borderRadius: 8 }}>No contacts yet</p>}
                </div>}
                {/* Related entities for non-company/non-subcontractor types */}
                {type !== "company" && type !== "subcontractor" && relProps.length > 0 && <div style={{ marginBottom: 24 }}><h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: "0 0 8px" }}>Properties ({relProps.length})</h4>
                  {relProps.map(p => <div key={p.id} onClick={() => setSelected({ type: "property", id: p.id })} style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${C.gray200}`, marginBottom: 4, cursor: "pointer" }} onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>🏠 {p.name}</div><div style={{ fontSize: 10, color: C.gray400 }}>{p.address}</div></div>)}
                </div>}
                {type !== "company" && type !== "subcontractor" && relContacts.length > 0 && <div style={{ marginBottom: 24 }}><h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: "0 0 8px" }}>Contacts ({relContacts.length})</h4>
                  {relContacts.map(c => <div key={c.id} onClick={() => setSelected({ type: "contact", id: c.id })} style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${C.gray200}`, marginBottom: 4, cursor: "pointer" }} onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>👤 {c.name}</div><div style={{ fontSize: 10, color: C.gray400 }}>{c.email} · {c.phone}</div></div>)}
                </div>}
                {/* Create Project or Ticket — not for subcontractors */}
                {type !== "subcontractor" && <div style={{ marginBottom: 24 }}>
                  <h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", letterSpacing: "0.08em", margin: "0 0 10px" }}>Create New</h4>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => { const propEntity = type === "property" ? entity : null; setSelected(null); setShowCreateLead({ companyId: type === "company" ? id : entity.companyId || "", propertyId: type === "property" ? id : "", contactId: type === "contact" ? id : "", projectType: propEntity?.propertyType || "Apartment Complex" }); }} style={{ flex: 1, padding: "14px 0", borderRadius: 8, border: "none", background: `linear-gradient(135deg, ${C.navy}, ${C.navyLight})`, color: C.white, fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: `0 4px 12px ${C.navy}30` }}>💼 New Project</button>
                    <button onClick={() => { setSelected(null); setShowCreateTicket({ companyId: type === "company" ? id : entity.companyId || "", propertyId: type === "property" ? id : "", contactId: type === "contact" ? id : "" }); }} style={{ flex: 1, padding: "14px 0", borderRadius: 8, border: "none", background: `linear-gradient(135deg, ${C.red}, ${C.redDark})`, color: C.white, fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: `0 4px 12px ${C.red}30` }}>🔧 New Service Ticket</button>
                  </div>
                </div>}
                {/* Sales History — clickable, not for subcontractors */}
                {type !== "subcontractor" && <div style={{ marginBottom: 24 }}><h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: "0 0 8px" }}>Sales History ({leads.length})</h4>
                  {leads.length > 0 ? leads.map(l => { const stg = SALES_STAGES.find(s => s.id === l.stage); return (
                    <div key={l.id} onClick={() => setViewingLead(l)} style={{ padding: "10px 14px", borderRadius: 6, border: `1px solid ${C.gray200}`, marginBottom: 4, display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", transition: "background 0.15s" }} onMouseEnter={e => e.currentTarget.style.background = C.blueBg} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <div><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>💼 {l.jobName || l.company || companies.find(c => c.id === l.companyId)?.name || "Project"}</div><div style={{ fontSize: 10, color: C.gray400 }}>{stg?.label} · {l.estimator ? `Est: ${l.estimator} · ` : ""}{new Date(l.createdAt).toLocaleDateString()}{l.bidDueDate ? ` · Bid: ${new Date(l.bidDueDate + "T12:00:00").toLocaleDateString()}` : ""}</div></div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 12, fontWeight: 700, color: C.navy }}>{formatCurrency(l.estimatedValue || 0)}</span><span style={{ color: C.gray400, fontSize: 11 }}>→</span></div>
                    </div>);
                  }) : <p style={{ fontSize: 12, color: C.gray400, textAlign: "center", padding: 12, background: C.gray50, borderRadius: 8 }}>No sales history</p>}
                </div>}
                {/* Service History — clickable, not for subcontractors */}
                {type !== "subcontractor" && <div><h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: "0 0 8px" }}>Service History ({tix.length})</h4>
                  {tix.length > 0 ? tix.map(t => (
                    <div key={t.id} onClick={() => setViewingTicket(t)} style={{ padding: "8px 12px", borderRadius: 6, border: `1px solid ${C.gray200}`, marginBottom: 4, display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", transition: "background 0.15s" }} onMouseEnter={e => e.currentTarget.style.background = C.yellowBg} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <div><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>🔧 {t.subject}</div><div style={{ fontSize: 10, color: C.gray400 }}>{t.type} · {t.status} · {new Date(t.createdAt).toLocaleDateString()}</div></div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ padding: "2px 6px", borderRadius: 4, fontSize: 9, fontWeight: 700, background: (TSTATUS_COLORS[t.status] || C.gray400) + "18", color: TSTATUS_COLORS[t.status] || C.gray400 }}>{t.status}</span><span style={{ color: C.gray400, fontSize: 11 }}>→</span></div>
                    </div>
                  )) : <p style={{ fontSize: 12, color: C.gray400, textAlign: "center", padding: 12, background: C.gray50, borderRadius: 8 }}>No service history</p>}
                </div>}
                {/* Tasks */}
                <div style={{ marginTop: 24 }}>
                  <TasksPanel objectType={type} objectId={id} user={user} crmUsers={crmUsers} />
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div style={{ background: C.gray50, minHeight: "calc(100vh - 56px)" }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", padding: "28px 32px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
              <div><h1 style={{ fontSize: 24, fontWeight: 800, color: C.navy, margin: 0 }}>Directory</h1><p style={{ fontSize: 14, color: C.gray500, margin: "4px 0 0" }}>Companies, properties & contacts — the backbone of your CRM</p></div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 24 }}>
              <StatCard label="Companies" value={companies.length} icon={I.building} accent={C.navy} />
              <StatCard label="Properties" value={properties.length} icon={I.layers} accent={C.blue} />
              <StatCard label="Contacts" value={contacts.length} icon={I.user} accent={C.green} />
              <StatCard label="Subcontractors" value={(subcontractors || []).length} icon="🔧" accent={C.red} />
            </div>
            {/* Tabs + search */}
            <div style={{ display: "flex", gap: 4, marginBottom: 16, background: C.white, border: `1px solid ${C.gray200}`, borderRadius: 8, padding: 3 }}>
              {[{ id: "companies", label: `Companies (${companies.length})` }, { id: "properties", label: `Properties (${properties.length})` }, { id: "contacts", label: `Contacts (${contacts.length})` }, { id: "subs", label: `Subs (${(subcontractors || []).length})` }].map(t => <button key={t.id} onClick={() => { setTab(t.id); setSearch(""); }} style={{ flex: 1, padding: "8px 0", borderRadius: 6, border: "none", fontSize: 12, fontWeight: 600, background: tab === t.id ? C.navy : "transparent", color: tab === t.id ? C.white : C.gray500, cursor: "pointer" }}>{t.label}</button>)}
            </div>
            <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
              <div style={{ position: "relative", flex: 1 }}><span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: C.gray400 }}>{I.search}</span>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder={`Search ${tab}...`} style={{ width: "100%", padding: "8px 10px 8px 34px", border: `1px solid ${C.gray300}`, borderRadius: 8, fontSize: 13, color: C.navy, outline: "none", background: C.white }} /></div>
              <button onClick={() => setShowCreate(tab === "companies" ? "company" : tab === "properties" ? "property" : tab === "contacts" ? "contact" : "subcontractor")} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: `linear-gradient(135deg, ${C.red}, ${C.redDark})`, color: C.white, fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>{I.plus} Add</button>
            </div>
            <div style={{ borderRadius: 10, border: `1px solid ${C.gray200}`, overflow: "hidden", background: C.white }}>
              {tab === "companies" && (filteredCo.length > 0 ? filteredCo.map(c => <EntityRow key={c.id} icon="🏢" name={c.name} sub={`${MARKET_LABELS[c.market] || "—"} · ${c.type || "—"}`} leadCount={leadsFor("company", c.id).length} ticketCount={ticketsFor("company", c.id).length} onClick={() => setSelected({ type: "company", id: c.id })} />) : <div style={{ padding: 32, textAlign: "center", color: C.gray400, fontSize: 12 }}>No companies</div>)}
              {tab === "properties" && (filteredPr.length > 0 ? filteredPr.map(p => <EntityRow key={p.id} icon="🏠" name={p.name} sub={`${p.address || "—"} · ${companies.find(c => c.id === p.companyId)?.name || "No company"}`} leadCount={leadsFor("property", p.id).length} ticketCount={ticketsFor("property", p.id).length} onClick={() => setSelected({ type: "property", id: p.id })} />) : <div style={{ padding: 32, textAlign: "center", color: C.gray400, fontSize: 12 }}>No properties</div>)}
              {tab === "contacts" && (filteredCt.length > 0 ? filteredCt.map(c => <EntityRow key={c.id} icon="👤" name={c.name} sub={`${c.email || "—"} · ${companies.find(co => co.id === c.companyId)?.name || "No company"}`} leadCount={leadsFor("contact", c.id).length} ticketCount={ticketsFor("contact", c.id).length} onClick={() => setSelected({ type: "contact", id: c.id })} />) : <div style={{ padding: 32, textAlign: "center", color: C.gray400, fontSize: 12 }}>No contacts</div>)}
              {tab === "subs" && (filteredSb.length > 0 ? filteredSb.map(sb => <SubcontractorRow key={sb.id} sub={sb} onClick={() => setSelected({ type: "subcontractor", id: sb.id })} />) : <div style={{ padding: 32, textAlign: "center", color: C.gray400, fontSize: 12 }}>No subcontractors</div>)}
            </div>
          </div>
          {showCreate && <CreateEntityModal type={showCreate} companies={companies} contacts={contacts} subcontractors={subcontractors} onClose={() => setShowCreate(null)} onCreate={handleCreate} />}
          {showCreateLead && <CreateLeadModal entities={entities} onClose={() => setShowCreateLead(null)} onCreate={handleCreateLead} prefill={showCreateLead} />}
          {showCreateTicket && <CreateTicketModal companies={companies} properties={properties} contacts={contacts} onClose={() => setShowCreateTicket(null)} onCreate={handleCreateTicket} onCreateEntity={(type, data) => handleCreate(type, data)} prefill={showCreateTicket} crmUsers={crmUsers} />}
          <EntityDetail />
          {/* Lead detail overlay from directory */}
          {viewingLead && (() => {
            const vl = salesLeads.find(l => l.id === viewingLead.id) || viewingLead;
            const vlStage = SALES_STAGES.find(s => s.id === vl.stage);
            const vlCo = companies.find(c => c.id === vl.companyId);
            const vlPr = properties.find(p => p.id === vl.propertyId);
            const vlCt = contacts.find(c => c.id === vl.contactId);
            return (
            <div style={{ position: "fixed", inset: 0, zIndex: 3000, background: "rgba(17,29,53,0.6)", backdropFilter: "blur(4px)", display: "flex", justifyContent: "center", alignItems: "center" }} onClick={() => setViewingLead(null)}>
              <div style={{ background: C.white, borderRadius: 16, width: 560, maxHeight: "80vh", overflow: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.3)" }} onClick={e => e.stopPropagation()}>
                <div style={{ padding: "20px 24px", background: `linear-gradient(135deg, ${C.navyDark}, ${C.navy})`, color: C.white, borderRadius: "16px 16px 0 0" }}>
                  <button onClick={() => setViewingLead(null)} style={{ background: "rgba(255,255,255,0.1)", border: "none", cursor: "pointer", color: C.white, padding: "4px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, marginBottom: 8 }}>← Back</button>
                  <h3 style={{ fontSize: 16, fontWeight: 700, margin: "0 0 4px" }}>{vl.jobName || vlCo?.name || "Project"}</h3>
                  <p style={{ fontSize: 11, opacity: 0.7, margin: 0 }}>{vlCo?.name && vl.jobName ? `🏢 ${vlCo.name} · ` : ""}{vlCt?.name || ""}</p>
                  <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center" }}>
                    <span style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, background: (vlStage?.color || C.gray400) + "30", color: vlStage?.color || C.gray400 }}>{vlStage?.label}</span>
                    {vl.market && <MarketTag market={vl.market} />}
                    <span style={{ fontSize: 15, fontWeight: 800, marginLeft: "auto" }}>{formatCurrency(vl.estimatedValue || 0)}</span>
                  </div>
                </div>
                <div style={{ padding: "16px 24px" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                    {vlCo && <div style={{ padding: "8px 10px", borderRadius: 6, background: C.gray50, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600 }}>Company</div><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{vlCo.name}</div></div>}
                    {vlPr && <div style={{ padding: "8px 10px", borderRadius: 6, background: C.gray50, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600 }}>Property</div><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{vlPr.name}</div><div style={{ fontSize: 10, color: C.gray400 }}>{vlPr.address}</div></div>}
                    {vl.estimator && <div style={{ padding: "8px 10px", borderRadius: 6, background: C.gray50, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600 }}>Estimator</div><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{vl.estimator}</div></div>}
                    {vl.bidDueDate && <div style={{ padding: "8px 10px", borderRadius: 6, background: C.gray50, border: `1px solid ${C.gray200}` }}><div style={{ fontSize: 10, color: C.gray400, fontWeight: 600 }}>Bid Due</div><div style={{ fontSize: 12, fontWeight: 600, color: C.navy }}>{new Date(vl.bidDueDate + "T12:00:00").toLocaleDateString()}</div></div>}
                  </div>
                  {vl.scopeOfWork && <div style={{ padding: "10px 12px", borderRadius: 6, background: C.blueBg, border: `1px solid ${C.blue}30`, marginBottom: 16 }}><div style={{ fontSize: 10, fontWeight: 700, color: C.navy, marginBottom: 2 }}>Scope of Work</div><div style={{ fontSize: 12, color: C.gray600, lineHeight: 1.5 }}>{vl.scopeOfWork}</div></div>}
                  <h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: "0 0 8px" }}>Activity Log</h4>
                  {(vl.activities || []).slice().reverse().slice(0, 10).map((a, i) => <div key={i} style={{ padding: "6px 0", borderBottom: `1px solid ${C.gray100}`, fontSize: 11 }}><span style={{ fontWeight: 600, color: C.navy }}>{a.by}</span> <span style={{ color: C.gray500 }}>— {a.text}</span> <span style={{ color: C.gray400, marginLeft: 4 }}>{new Date(a.at).toLocaleDateString()}</span></div>)}
                  {(!vl.activities || vl.activities.length === 0) && <p style={{ fontSize: 12, color: C.gray400 }}>No activity yet</p>}
                </div>
              </div>
            </div>);
          })()}
          {/* Ticket detail overlay from directory */}
          {viewingTicket && (() => {
            const vt = serviceTickets.find(t => t.id === viewingTicket.id) || viewingTicket;
            const vtCo = companies.find(c => c.id === vt.companyId);
            return (
            <div style={{ position: "fixed", inset: 0, zIndex: 3000, background: "rgba(17,29,53,0.6)", backdropFilter: "blur(4px)", display: "flex", justifyContent: "center", alignItems: "center" }} onClick={() => setViewingTicket(null)}>
              <div style={{ background: C.white, borderRadius: 16, width: 520, maxHeight: "80vh", overflow: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.3)" }} onClick={e => e.stopPropagation()}>
                <div style={{ padding: "20px 24px", background: `linear-gradient(135deg, ${C.red}, ${C.redDark})`, color: C.white, borderRadius: "16px 16px 0 0" }}>
                  <button onClick={() => setViewingTicket(null)} style={{ background: "rgba(255,255,255,0.2)", border: "none", cursor: "pointer", color: C.white, padding: "4px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, marginBottom: 8 }}>← Back</button>
                  <h3 style={{ fontSize: 16, fontWeight: 700, margin: "0 0 4px" }}>{vt.subject}</h3>
                  <p style={{ fontSize: 11, opacity: 0.8, margin: 0 }}>{vtCo?.name || ""} · {vt.type || ""}</p>
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    <span style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, background: "rgba(255,255,255,0.2)" }}>{vt.status}</span>
                    <span style={{ padding: "3px 8px", borderRadius: 5, fontSize: 10, fontWeight: 700, background: "rgba(255,255,255,0.2)" }}>{vt.priority}</span>
                  </div>
                </div>
                <div style={{ padding: "16px 24px" }}>
                  {vt.description && <div style={{ padding: "10px 12px", borderRadius: 6, background: C.gray50, border: `1px solid ${C.gray200}`, marginBottom: 16, fontSize: 12, color: C.gray600, lineHeight: 1.5 }}>{vt.description}</div>}
                  <h4 style={{ fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: "uppercase", margin: "0 0 8px" }}>Activity Log</h4>
                  {(vt.activities || []).slice().reverse().slice(0, 10).map((a, i) => <div key={i} style={{ padding: "6px 0", borderBottom: `1px solid ${C.gray100}`, fontSize: 11 }}><span style={{ fontWeight: 600, color: C.navy }}>{a.by}</span> <span style={{ color: C.gray500 }}>— {a.text}</span> <span style={{ color: C.gray400, marginLeft: 4 }}>{new Date(a.at).toLocaleDateString()}</span></div>)}
                  {(!vt.activities || vt.activities.length === 0) && <p style={{ fontSize: 12, color: C.gray400 }}>No activity yet</p>}
                </div>
              </div>
            </div>);
          })()}
        </div>
      );
    }

    function CreateEntityModal({ type, companies, contacts, onClose, onCreate }) {
      const labels = { company: "Company", property: "Property", contact: "Contact", subcontractor: "Subcontractor" };
      const [form, setForm] = useState(
        type === "company" ? { name: "", market: "ATL", type: "Property Manager", phone: "", address: "", notes: "" } :
        type === "property" ? { name: "", companyId: "", contactId: "", propertyType: "Apartment Complex", address: "", market: "ATL", sqft: 0, roofType: "", buildingCount: 1, notes: "" } :
        type === "contact" ? { firstName: "", lastName: "", name: "", companyId: "", contactType: "B2B", email: "", officePhone: "", mobilePhone: "", title: "", notes: "" } :
        { companyName: "", contactName: "", phone: "", email: "", market: "ATL", trades: [], insuranceExp: "", wcExp: "", w9OnFile: false, rating: 0, notes: "" }
      );
      const [validationError, setValidationError] = useState("");
      const fs = { width: "100%", padding: "10px 12px", border: `1px solid ${C.gray300}`, borderRadius: 8, fontSize: 13, color: C.navy, outline: "none", boxSizing: "border-box" };
      const ls = { fontSize: 11, fontWeight: 600, color: C.gray600, marginBottom: 3, display: "block" };
      const lsReq = { ...ls, color: C.navy };

      const isResidential = type === "property" && form.propertyType === "Residential";
      const propertyNeedsCompany = type === "property" && !isResidential;
      const contactIsB2B = type === "contact" && form.contactType === "B2B";
      const filteredContacts = form.companyId ? (contacts || []).filter(c => c.companyId === form.companyId) : (contacts || []);

      const validate = () => {
        if (type === "contact") {
          if (!form.firstName?.trim()) return "First name is required.";
          if (!form.lastName?.trim()) return "Last name is required.";
          if (!form.contactType) return "Contact type (B2C or B2B) is required.";
          if (contactIsB2B && !form.companyId) return "B2B contacts must have a company.";
        } else if (type === "subcontractor") {
          if (!form.companyName?.trim()) return "Company name is required.";
          if (!form.contactName?.trim()) return "Contact name is required.";
          if (!form.phone?.trim()) return "Phone is required.";
          if (!form.market) return "Market is required.";
        } else {
          if (!form.name?.trim()) return "Name is required.";
        }
        if (type === "property") {
          if (!form.propertyType) return "Property type is required.";
          if (propertyNeedsCompany && !form.companyId) return "Non-residential properties must have a company.";
          if (!form.contactId) return "A contact is required for every property.";
        }
        return "";
      };

      const handleSubmit = () => {
        const err = validate();
        if (err) { setValidationError(err); return; }
        setValidationError("");
        const submitData = type === "contact" ? { ...form, name: `${form.firstName.trim()} ${form.lastName.trim()}` } : form;
        onCreate(type, submitData);
      };

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 2100, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(17,29,53,0.6)", backdropFilter: "blur(4px)" }} onClick={onClose}>
          <div style={{ background: C.white, borderRadius: 16, width: 520, maxHeight: "85vh", overflow: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.3)" }} onClick={e => e.stopPropagation()}>
            <div style={{ padding: "24px 28px 16px", borderBottom: `1px solid ${C.gray200}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, color: C.navy, margin: 0 }}>New {labels[type]}</h2>
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: C.gray400 }}>{I.x}</button>
            </div>
            <div style={{ padding: "20px 28px 28px", display: "grid", gap: 12 }}>
              {type !== "contact" && <div><label style={lsReq}>Name *</label><input style={fs} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} /></div>}

              {/* ── COMPANY FIELDS ── */}
              {type === "company" && <>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div><label style={ls}>Market</label><select style={fs} value={form.market} onChange={e => setForm(f => ({ ...f, market: e.target.value }))}>{MARKETS.map(m => <option key={m} value={m}>{MARKET_LABELS[m]}</option>)}</select></div>
                  <div><label style={ls}>Type</label><select style={fs} value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>{COMPANY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                </div>
                <div><label style={ls}>Phone</label><input style={fs} value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} /></div>
                <div><label style={ls}>Address</label><input style={fs} value={form.address} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} /></div>
              </>}

              {/* ── PROPERTY FIELDS ── */}
              {type === "property" && <>
                <div><label style={lsReq}>Property Type *</label><select style={fs} value={form.propertyType} onChange={e => setForm(f => ({ ...f, propertyType: e.target.value, companyId: e.target.value === "Residential" ? "" : f.companyId }))}>{PROPERTY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                {!isResidential && <div><label style={lsReq}>Company *</label><SearchableSelect options={companies.map(c => ({ value: c.id, label: c.name, sub: `${c.market || ""} · ${c.type || ""}` }))} value={form.companyId} onChange={v => setForm(f => ({ ...f, companyId: v }))} placeholder="Type to search companies..." required emptyMsg="No companies found" /></div>}
                {isResidential && <div><label style={ls}>Company <span style={{ fontWeight: 400, color: C.gray400 }}>(optional for residential)</span></label><SearchableSelect options={companies.map(c => ({ value: c.id, label: c.name, sub: `${c.market || ""}` }))} value={form.companyId} onChange={v => setForm(f => ({ ...f, companyId: v }))} placeholder="Type to search companies..." /></div>}
                <div><label style={lsReq}>Contact *</label><SearchableSelect options={filteredContacts.map(c => ({ value: c.id, label: c.name, sub: [c.email, c.phone].filter(Boolean).join(" · ") }))} value={form.contactId} onChange={v => setForm(f => ({ ...f, contactId: v }))} placeholder="Type to search contacts..." required emptyMsg="No contacts — create one first" /></div>
                <div><label style={ls}>Address</label><input style={fs} value={form.address} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} /></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                  <div><label style={ls}>Market</label><select style={fs} value={form.market} onChange={e => setForm(f => ({ ...f, market: e.target.value }))}>{MARKETS.map(m => <option key={m} value={m}>{MARKET_LABELS[m]}</option>)}</select></div>
                  <div><label style={ls}>Sq Ft</label><input style={fs} type="number" value={form.sqft} onChange={e => setForm(f => ({ ...f, sqft: Number(e.target.value) }))} /></div>
                  <div><label style={ls}>Roof Type</label><select style={fs} value={form.roofType} onChange={e => setForm(f => ({ ...f, roofType: e.target.value }))}><option value="">—</option>{ROOF_TYPES.map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                </div>
              </>}

              {/* ── CONTACT FIELDS ── */}
              {type === "contact" && <>

    // AI Date Detection — parses natural language dates from task text
    function detectDateFromText(text) {
      const today = new Date();
      const lower = text.toLowerCase();
      // "today"
      if (/\btoday\b/.test(lower)) return today.toISOString().split("T")[0];
      // "tomorrow"
      if (/\btomorrow\b/.test(lower)) { const d = new Date(today); d.setDate(d.getDate() + 1); return d.toISOString().split("T")[0]; }
      // "next monday", "next friday", etc.
      const dayNames = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
      const nextDayMatch = lower.match(/\bnext\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
      if (nextDayMatch) { const target = dayNames.indexOf(nextDayMatch[1]); const d = new Date(today); const diff = (target - d.getDay() + 7) % 7 || 7; d.setDate(d.getDate() + diff); return d.toISOString().split("T")[0]; }
      // "this monday", "this friday", etc.
      const thisDayMatch = lower.match(/\bthis\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
      if (thisDayMatch) { const target = dayNames.indexOf(thisDayMatch[1]); const d = new Date(today); const diff = (target - d.getDay() + 7) % 7; if (diff > 0) { d.setDate(d.getDate() + diff); return d.toISOString().split("T")[0]; } }
      // "in X days"
      const inDaysMatch = lower.match(/\bin\s+(\d+)\s+days?\b/);
      if (inDaysMatch) { const d = new Date(today); d.setDate(d.getDate() + parseInt(inDaysMatch[1])); return d.toISOString().split("T")[0]; }
      // "by march 15", "due march 15", "on march 15"
      const monthNames = ["january","february","march","april","may","june","july","august","september","october","november","december"];
      const dateMatch = lower.match(/\b(?:by|due|on|before)\s+(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{1,2})(?:st|nd|rd|th)?\b/);
      if (dateMatch) { const m = monthNames.indexOf(dateMatch[1]); const day = parseInt(dateMatch[2]); const year = (m < today.getMonth() || (m === today.getMonth() && day < today.getDate())) ? today.getFullYear() + 1 : today.getFullYear(); return `${year}-${String(m + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`; }
      // "3/15", "3/15/2026"
      const slashMatch = text.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
      if (slashMatch) { const m = parseInt(slashMatch[1]); const day = parseInt(slashMatch[2]); let year = slashMatch[3] ? parseInt(slashMatch[3]) : today.getFullYear(); if (year < 100) year += 2000; return `${year}-${String(m).padStart(2, "0")}-${String(day).padStart(2, "0")}`; }
      return null;
    }

    function TasksPanel({ objectType, objectId, user, crmUsers }) {
      const collectionKey = `cr_tasks_${objectType}_${objectId}`;
      const [tasks, saveTasks] = useFirestoreCollection(collectionKey, []);
      const tasksRef = useRef(tasks); tasksRef.current = tasks;
      const setTasks = useCallback(u => { const n = typeof u === "function" ? u(tasksRef.current) : u; saveTasks(n); }, [saveTasks]);
      const [newTask, setNewTask] = useState("");
      const [newDue, setNewDue] = useState("");
      const [newAssignee, setNewAssignee] = useState(user?.name || "");
      const [showCompleted, setShowCompleted] = useState(false);
      const activeUsers = (crmUsers || []).filter(u => u.active !== false);

      // AI date detection: auto-detect dates as user types
      const handleTaskInput = (text) => {
        setNewTask(text);
        if (!newDue) {
          const detected = detectDateFromText(text);
          if (detected) setNewDue(detected);
        }
      };

      const addTask = () => {
        if (!newTask.trim()) return;
        if (!newAssignee) { alert("Please assign the task to a user."); return; }
        const detectedDate = newDue || detectDateFromText(newTask) || null;
        setTasks(prev => [...prev, { id: generateId(), title: newTask.trim(), dueDate: detectedDate, assignee: newAssignee, completed: false, createdAt: new Date().toISOString(), createdBy: user.name }]);
        setNewTask(""); setNewDue(""); setNewAssignee(user?.name || "");
      };

      const toggleTask = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed, completedAt: !t.completed ? new Date().toISOString() : null } : t));
      const removeTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));
      const [editingTask, setEditingTask] = useState(null);
      const [editTitle, setEditTitle] = useState("");
      const [editDue, setEditDue] = useState("");
      const [editAssignee, setEditAssignee] = useState("");
      const openEditTask = (t) => { setEditingTask(t.id); setEditTitle(t.title); setEditDue(t.dueDate || ""); setEditAssignee(t.assignee || ""); };
      const saveEditTask = () => { if (!editTitle.trim()) return; setTasks(prev => prev.map(t => t.id === editingTask ? { ...t, title: editTitle.trim(), dueDate: editDue || null, assignee: editAssignee } : t)); setEditingTask(null); };
      const cancelEditTask = () => setEditingTask(null);

      const pending = tasks.filter(t => !t.completed).sort((a, b) => { if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate); if (a.dueDate) return -1; if (b.dueDate) return 1; return 0; });
      const completed = tasks.filter(t => t.completed);

      return (
        <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.navy }}>📋 Tasks ({pending.length} open)</span>
            {completed.length > 0 && <button onClick={() => setShowCompleted(!showCompleted)} style={{ fontSize: 10, color: C.gray400, background: "none", border: "none", cursor: "pointer" }}>{showCompleted ? "Hide" : "Show"} {completed.length} completed</button>}
          </div>
          {/* Add task */}
          <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
            <input value={newTask} onChange={e => handleTaskInput(e.target.value)} onKeyDown={e => e.key === "Enter" && addTask()} placeholder="Add a task... (dates like 'by March 20' auto-detected)" style={{ flex: 1, minWidth: 180, padding: "7px 10px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, color: C.navy }} />
            <input type="date" value={newDue} onChange={e => setNewDue(e.target.value)} title="Due date (auto-detected from task text)" style={{ padding: "7px 8px", border: `1px solid ${newDue ? C.green + "80" : C.gray300}`, borderRadius: 6, fontSize: 11, color: C.gray600, width: 120 }} />
            <select value={newAssignee} onChange={e => setNewAssignee(e.target.value)} style={{ padding: "7px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 11, color: C.gray600, width: 150 }}>{activeUsers.length > 0 ? activeUsers.map(u => <option key={u.id} value={u.name}>{u.name}{u.role ? ` (${ROLE_PRESETS[u.role]?.label || u.role})` : ""}</option>) : <option value={user?.name || ""}>{user?.name || "Me"}</option>}</select>
            <button onClick={addTask} style={{ padding: "7px 14px", borderRadius: 6, border: "none", background: C.navy, color: C.white, fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>+ Add</button>
          </div>
          {/* Pending tasks */}
          {pending.length === 0 && <div style={{ padding: 12, textAlign: "center", color: C.gray400, fontSize: 11 }}>No open tasks</div>}
          {pending.map(t => editingTask === t.id ? (
            <div key={t.id} style={{ padding: "10px 0", borderBottom: `1px solid ${C.gray100}` }}>
              <div style={{ display: "flex", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
                <input value={editTitle} onChange={e => setEditTitle(e.target.value)} onKeyDown={e => e.key === "Enter" && saveEditTask()} autoFocus style={{ flex: 1, minWidth: 180, padding: "7px 10px", border: `1px solid ${C.blue}`, borderRadius: 6, fontSize: 12, color: C.navy, outline: "none" }} />
                <input type="date" value={editDue} onChange={e => setEditDue(e.target.value)} style={{ padding: "7px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 11, color: C.gray600, width: 120 }} />
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <select value={editAssignee} onChange={e => setEditAssignee(e.target.value)} style={{ padding: "7px 8px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 11, color: C.gray600, flex: 1, maxWidth: 180 }}>{activeUsers.length > 0 ? activeUsers.map(u => <option key={u.id} value={u.name}>{u.name}{u.role ? ` (${ROLE_PRESETS[u.role]?.label || u.role})` : ""}</option>) : <option value={user?.name || ""}>{user?.name || "Me"}</option>}</select>
                <button onClick={saveEditTask} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: C.green, color: C.white, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Save</button>
                <button onClick={cancelEditTask} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${C.gray300}`, background: C.white, color: C.gray500, fontSize: 11, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          ) : (
            <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: `1px solid ${C.gray100}` }}>
              <input type="checkbox" checked={false} onChange={() => toggleTask(t.id)} style={{ width: 16, height: 16, cursor: "pointer", accentColor: C.green }} />
              <div style={{ flex: 1, cursor: "pointer" }} onClick={() => openEditTask(t)} title="Click to edit">
                <span style={{ fontSize: 12, color: C.navy }}>{t.title}</span>
                {t.assignee && <span style={{ fontSize: 10, color: C.gray400, marginLeft: 6 }}>→ {t.assignee}</span>}
              </div>
              {t.dueDate && <span style={{ fontSize: 10, color: new Date(t.dueDate) < new Date() ? C.red : C.gray400, fontWeight: 600 }}>{new Date(t.dueDate).toLocaleDateString()}</span>}
              <button onClick={() => openEditTask(t)} style={{ background: "none", border: "none", color: C.gray400, cursor: "pointer", fontSize: 11, padding: "0 4px" }} title="Edit task">✏</button>
              <button onClick={() => removeTask(t.id)} style={{ background: "none", border: "none", color: C.gray300, cursor: "pointer", fontSize: 14, padding: "0 4px" }}>×</button>
            </div>
          ))}
          {/* Completed tasks */}
          {showCompleted && completed.map(t => (
            <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: `1px solid ${C.gray100}`, opacity: 0.5 }}>
              <input type="checkbox" checked={true} onChange={() => toggleTask(t.id)} style={{ width: 16, height: 16, cursor: "pointer", accentColor: C.green }} />
              <span style={{ flex: 1, fontSize: 12, color: C.gray500, textDecoration: "line-through" }}>{t.title}</span>
              <button onClick={() => removeTask(t.id)} style={{ background: "none", border: "none", color: C.gray300, cursor: "pointer", fontSize: 14, padding: "0 4px" }}>×</button>
            </div>
          ))}
        </div>
      );
    }

          (pos) => { setGeoLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy, capturedAt: new Date().toISOString() }); setCapturingGeo(false); },

    // ============================================================
    // COMPONENT: INSPECTION PHOTOS
    // ============================================================
    function InspectionPhotos({ inspection, onUpdate, user }) {
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);
      const fileRef = useRef(null);
      const photos = inspection?.photos || [];

      const handleUpload = async (files) => {
        if (!files.length) return;
        setUploading(true);
        const newPhotos = [];
        for (const file of files) {
          try {
            if (firebaseStorage) {
              const path = "inspections/" + inspection.id + "/" + Date.now() + "_" + file.name;
              const ref = firebaseStorage.ref(path);
              await ref.put(file);
              const url = await ref.getDownloadURL();
              newPhotos.push({
                id: generateId(),
                url,
                storagePath: path,
                caption: "",
                location: "",
                category: "general",
                takenAt: new Date().toISOString(),
                takenBy: user?.name || ""
              });
            } else {
              // Fallback: use local data URL
              const reader = new FileReader();
              reader.onload = (ev) => {
                newPhotos.push({
                  id: generateId(),
                  url: ev.target.result,
                  caption: "",
                  location: "",
                  category: "general",
                  takenAt: new Date().toISOString(),
                  takenBy: user?.name || ""
                });
                if (newPhotos.length === files.length) {
                  setUploading(false);
                  setProgress(0);
                  onUpdate({ ...inspection, photos: [...photos, ...newPhotos] });
                }
              };
              reader.readAsDataURL(file);
            }
          } catch (e) {
            console.error("Photo upload error:", e);
          }
        }
        if (firebaseStorage) {
          setUploading(false);
          setProgress(0);
          onUpdate({ ...inspection, photos: [...photos, ...newPhotos] });
        }
      };

      const removePhoto = (id) => {
        onUpdate({ ...inspection, photos: photos.filter(p => p.id !== id) });
      };

      const updatePhotoCaption = (id, caption) => {
        onUpdate({ ...inspection, photos: photos.map(p => p.id === id ? { ...p, caption } : p) });
      };

      return React.createElement("div", null,
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 } },
          React.createElement("h4", { style: { fontSize: 14, fontWeight: 700, color: C.navy, margin: 0 } }, "📷 Photos (" + photos.length + ")"),
          React.createElement("div", null,
            React.createElement("input", { ref: fileRef, type: "file", accept: "image/*", multiple: true, onChange: e => handleUpload(Array.from(e.target.files || [])), style: { display: "none" } }),
            React.createElement("button", { onClick: () => fileRef.current?.click(), disabled: uploading, style: { padding: "6px 14px", borderRadius: 6, border: "none", background: uploading ? C.gray300 : C.navy, color: C.white, fontSize: 11, fontWeight: 600, cursor: uploading ? "default" : "pointer", opacity: uploading ? 0.6 : 1 } }, uploading ? "Uploading..." : "Add Photos")
          )
        ),
        photos.length ? React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 10 } }, photos.map(p =>
          React.createElement("div", { key: p.id, style: { borderRadius: 8, overflow: "hidden", border: "1px solid " + C.gray200, background: C.white, boxShadow: "0 2px 8px rgba(0,0,0,0.08)" } },
            React.createElement("img", { src: p.url, alt: p.caption || "Photo", style: { width: "100%", height: 100, objectFit: "cover" } }),
            React.createElement("div", { style: { padding: "6px 8px" } },
              React.createElement("input", { value: p.caption || "", onChange: e => updatePhotoCaption(p.id, e.target.value), placeholder: "Caption", style: { width: "100%", fontSize: 10, padding: "3px 4px", border: "1px solid " + C.gray200, borderRadius: 4, marginBottom: 4 } }),
              React.createElement("div", { style: { fontSize: 9, color: C.gray500 } }, p.category || "general"),
              React.createElement("div", { style: { fontSize: 9, color: C.gray400, marginBottom: 4 } }, new Date(p.takenAt).toLocaleDateString()),
              React.createElement("button", { onClick: () => removePhoto(p.id), style: { width: "100%", padding: "3px", fontSize: 9, background: C.redBg, color: C.red, border: "none", borderRadius: 4, cursor: "pointer" } }, "Remove")
            )
          )
        )) : React.createElement("div", { style: { padding: 24, textAlign: "center", color: C.gray400, fontSize: 12, border: "2px dashed " + C.gray300, borderRadius: 8, background: C.gray50 } }, "No photos yet — click Add Photos to upload")
      );
    }

    function InspectionsList({ inspections, onOpen, onCreate, entityType, entityId }) {

    // ============================================================
    // MODULE: INSPECTIONS (Top-level — all inspections across projects/tickets)
    // ============================================================
    function InspectionsModule({ user, role, inspections, setInspections, entities, crmUsers, salesLeads, serviceTickets }) {
      const { companies, properties } = entities;
      const [search, setSearch] = useState("");
      const [statusFilter, setStatusFilter] = useState("All");
      const [assigneeFilter, setAssigneeFilter] = useState("All");
      const [editingInspection, setEditingInspection] = useState(null);
      const [sortField, setSortField] = useState("scheduledDate");
      const [sortDir, setSortDir] = useState("asc");
      const [showAssociationPicker, setShowAssociationPicker] = useState(false);
      const [assocSearch, setAssocSearch] = useState("");

      const co = (id) => companies.find(c => c.id === id);
      const pr = (id) => properties.find(p => p.id === id);

      const getEntityLabel = (ins) => {
        if (ins.entityType === "lead") return ins.entityName || "Sales Lead";
        if (ins.entityType === "ticket") return ins.entityName || "Service Ticket";
        return ins.entityType || "—";
      };

      const getPropertyLabel = (ins) => {
        if (ins.propertyId) { const p = pr(ins.propertyId); return p ? p.name : ""; }
        return "";
      };

      const inspectorNames = [...new Set(inspections.map(i => i.assignedTo).filter(Boolean))];

      const filtered = inspections.filter(ins => {
        if (statusFilter !== "All" && ins.status !== statusFilter) return false;
        if (assigneeFilter !== "All" && ins.assignedTo !== assigneeFilter) return false;
        if (search) {
          const s = search.toLowerCase();
          const label = getEntityLabel(ins).toLowerCase();
          const prop = getPropertyLabel(ins).toLowerCase();
          const assignee = (ins.assignedTo || "").toLowerCase();
          const roofType = (ins.data?.roof_type || "").toLowerCase();
          if (!label.includes(s) && !prop.includes(s) && !assignee.includes(s) && !roofType.includes(s)) return false;
        }
        return true;
      });

      const sorted = [...filtered].sort((a, b) => {
        let va, vb;
        if (sortField === "scheduledDate") { va = a.scheduledDate || "9999"; vb = b.scheduledDate || "9999"; }
        else if (sortField === "status") { va = a.status || ""; vb = b.status || ""; }
        else if (sortField === "assignedTo") { va = a.assignedTo || ""; vb = b.assignedTo || ""; }
        else if (sortField === "createdAt") { va = a.createdAt || ""; vb = b.createdAt || ""; }
        else { va = ""; vb = ""; }
        if (va < vb) return sortDir === "asc" ? -1 : 1;
        if (va > vb) return sortDir === "asc" ? 1 : -1;
        return 0;
      });

      const toggleSort = (field) => {
        if (sortField === field) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortField(field); setSortDir("asc"); }
      };

      const handleSave = (ins) => {
        setInspections(prev => { const idx = prev.findIndex(i => i.id === ins.id); if (idx >= 0) { const u = [...prev]; u[idx] = ins; return u; } return [...prev, ins]; });
        setEditingInspection(null);
      };

      const handleCreate = () => {
        setShowAssociationPicker(true);
        setAssocSearch("");
      };

      const createWithAssociation = (entityType, entityId, entityName) => {
        setShowAssociationPicker(false);
        setEditingInspection({ id: generateId(), entityType, entityId, entityName, data: {}, status: "Draft", summary: "", assignedTo: "", scheduledDate: "", createdAt: new Date().toISOString(), createdBy: user.name });
      };

      const STATUS_COLORS = { Draft: C.gray400, "In Progress": "#D97706", Complete: C.green };
      const sortIcon = (f) => sortField === f ? (sortDir === "asc" ? " ↑" : " ↓") : "";
      const thStyle = { padding: "10px 12px", textAlign: "left", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", color: C.gray500, cursor: "pointer", userSelect: "none", borderBottom: `2px solid ${C.gray200}` };
      const tdStyle = { padding: "12px 12px", fontSize: 13, color: C.navy, borderBottom: `1px solid ${C.gray100}` };

      if (editingInspection) return <InspectionForm inspection={editingInspection} onSave={handleSave} onClose={() => setEditingInspection(null)} user={user} crmUsers={crmUsers} />;

      // Association picker modal
      const AssociationPicker = showAssociationPicker ? (() => {
        const s = assocSearch.toLowerCase();
        const leads = (salesLeads || []).filter(l => !s || (l.jobName || "").toLowerCase().includes(s) || (companies.find(c => c.id === l.companyId)?.name || l.company || "").toLowerCase().includes(s));
        const tickets = (serviceTickets || []).filter(t => !s || (t.subject || "").toLowerCase().includes(s) || (companies.find(c => c.id === t.companyId)?.name || "").toLowerCase().includes(s));
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 10000, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setShowAssociationPicker(false)}>
            <div style={{ background: C.white, borderRadius: 12, width: 500, maxHeight: "80vh", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }} onClick={e => e.stopPropagation()}>
              <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.gray200}` }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: C.navy, margin: "0 0 4px" }}>Associate Inspection</h3>
                <p style={{ fontSize: 12, color: C.gray500, margin: "0 0 10px" }}>Every inspection must be linked to a project or service ticket.</p>
                <input value={assocSearch} onChange={e => setAssocSearch(e.target.value)} placeholder="Search projects or tickets..." style={{ width: "100%", padding: "8px 12px", border: `1px solid ${C.gray300}`, borderRadius: 6, fontSize: 12, color: C.navy, boxSizing: "border-box" }} autoFocus />
              </div>
              <div style={{ maxHeight: "55vh", overflowY: "auto", padding: "8px 12px" }}>
                {leads.length > 0 && <div style={{ fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase", padding: "8px 8px 4px", letterSpacing: "0.05em" }}>Projects ({leads.length})</div>}
                {leads.slice(0, 15).map(l => {
                  const coName = companies.find(c => c.id === l.companyId)?.name || l.company || "";
                  return (
                    <div key={l.id} onClick={() => createWithAssociation("lead", l.id, l.jobName || coName)} style={{ padding: "10px 12px", borderRadius: 6, cursor: "pointer", marginBottom: 2 }} onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: C.navy }}>{l.jobName || coName || "Untitled"}</div>
                      <div style={{ fontSize: 11, color: C.gray400 }}>{coName} · {l.status || "—"}</div>
                    </div>
                  );
                })}
                {tickets.length > 0 && <div style={{ fontSize: 10, fontWeight: 700, color: C.gray400, textTransform: "uppercase", padding: "8px 8px 4px", letterSpacing: "0.05em" }}>Service Tickets ({tickets.length})</div>}
                {tickets.slice(0, 15).map(t => (
                  <div key={t.id} onClick={() => createWithAssociation("ticket", t.id, t.subject)} style={{ padding: "10px 12px", borderRadius: 6, cursor: "pointer", marginBottom: 2 }} onMouseEnter={e => e.currentTarget.style.background = C.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: C.navy }}>{t.subject || "Untitled"}</div>
                    <div style={{ fontSize: 11, color: C.gray400 }}>{t.status || "—"} · {t.priority || "—"}</div>
                  </div>
                ))}
                {leads.length === 0 && tickets.length === 0 && <div style={{ padding: 24, textAlign: "center", color: C.gray400, fontSize: 12 }}>No matching projects or tickets found</div>}
              </div>
              <div style={{ padding: "12px 16px", borderTop: `1px solid ${C.gray200}`, textAlign: "right" }}>
                <button onClick={() => setShowAssociationPicker(false)} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${C.gray300}`, background: C.white, color: C.gray600, fontSize: 12, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          </div>
        );
      })() : null;

      // Stats
      const totalCount = inspections.length;
      const scheduledCount = inspections.filter(i => i.status !== "Complete" && i.scheduledDate).length;
      const inProgressCount = inspections.filter(i => i.status === "In Progress").length;
      const completeCount = inspections.filter(i => i.status === "Complete").length;

      return (
        <div style={{ padding: 24 }}>
          {AssociationPicker}
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <h1 style={{ fontSize: 22, fontWeight: 800, color: C.navy, margin: 0 }}>🔍 Inspections</h1>
              <p style={{ fontSize: 12, color: C.gray400, margin: "4px 0 0" }}>All roof inspections across projects and service tickets</p>
            </div>
            <button onClick={handleCreate} style={{ padding: "10px 20px", borderRadius: 8, border: "none", background: C.navy, color: C.white, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ New Inspection</button>
          </div>

          {/* Stats cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
            {[
              { label: "Total", value: totalCount, color: C.navy },
              { label: "Scheduled", value: scheduledCount, color: C.blue },
              { label: "In Progress", value: inProgressCount, color: "#D97706" },
              { label: "Complete", value: completeCount, color: C.green },
            ].map(s => (
              <div key={s.label} style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.gray200}`, padding: "14px 18px" }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: "0.05em" }}>{s.label}</div>
                <div style={{ fontSize: 24, fontWeight: 800, color: s.color, marginTop: 2 }}>{s.value}</div>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search inspections..." style={{ flex: 1, minWidth: 200, padding: "8px 12px", border: `1px solid ${C.gray300}`, borderRadius: 8, fontSize: 12, color: C.navy }} />
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{ padding: "8px 12px", border: `1px solid ${C.gray300}`, borderRadius: 8, fontSize: 12, color: C.navy, background: C.white }}>
              <option value="All">All Statuses</option>
              {INSPECTION_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <select value={assigneeFilter} onChange={e => setAssigneeFilter(e.target.value)} style={{ padding: "8px 12px", border: `1px solid ${C.gray300}`, borderRadius: 8, fontSize: 12, color: C.navy, background: C.white }}>
              <option value="All">All Inspectors</option>
              {inspectorNames.map(n => <option key={n} value={n}>{n}</option>)}
            </select>
          </div>

          {/* Table */}
          <div style={{ background: C.white, borderRadius: 12, border: `1px solid ${C.gray200}`, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: C.gray50 }}>
                  <th style={thStyle} onClick={() => toggleSort("scheduledDate")}>Scheduled Date{sortIcon("scheduledDate")}</th>
                  <th style={thStyle} onClick={() => toggleSort("assignedTo")}>Inspector{sortIcon("assignedTo")}</th>
                  <th style={thStyle}>Property / Entity</th>
                  <th style={thStyle}>Roof Type</th>
